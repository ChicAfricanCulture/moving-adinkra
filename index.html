<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adinkra Movers</title>

<style>
:root{
  --bg:#f2e4d6;
  --ink:#1f140e;
  --muted:rgba(31,20,14,0.7);
  --line:rgba(31,20,14,0.16);
  --shadow:0 12px 26px rgba(0,0,0,0.12);

  --windowW:clamp(220px,36vw,340px);

  --symbolMin:72px;
  --symbolMax:110px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.wrap{
  width:min(960px,100%);
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* HEADER STRIP */
.top{
  background:rgba(255,255,255,0.7);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.top-header{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.brand h1{
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.brand p{
  color:var(--muted);
  font-size:0.95rem;
  margin-top:4px;
}

.stats{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.stat{
  background:white;
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 10px;
  font-weight:1000;
  font-size:0.9rem;
}

.mode{
  display:flex;
  border:1px solid var(--line);
  border-radius:999px;
  overflow:hidden;
  background:white;
}

.mode button{
  border:none;
  background:transparent;
  padding:8px 12px;
  font-weight:1000;
  cursor:pointer;
}

.mode button.active{
  background:#ffd400;
}

/* TARGET STRIP */
.targets{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  border-top:1px solid var(--line);
  padding-top:10px;
}

.target{
  display:flex;
  align-items:center;
  gap:8px;
  background:white;
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
}

.target.done{opacity:0.5;}

.target img{
  width:46px;
  height:46px;
  object-fit:contain;
}

/* COLOR DOT */
.color-dot{
  width:12px;
  height:12px;
  border-radius:50%;
}

.dot-red{background:#ff2d2d;}
.dot-yellow{background:#ffd400;}
.dot-blue{background:#0066ff;}
.dot-green{background:#00b050;}

/* MACHINE */
.machine{
  position:relative;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(255,255,255,0.6);
  padding:14px;
  box-shadow:var(--shadow);
}

.window{
  position:absolute;
  left:50%;
  top:14px;
  bottom:14px;
  width:var(--windowW);
  transform:translateX(-50%);
  border:3px solid rgba(31,20,14,0.35);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,0.6);
  pointer-events:none;
  z-index:4;
}

.lane{
  overflow:hidden;
  margin:10px 0;
  padding:10px 0;
  background:white;
  border:1px solid var(--line);
}

.moving-row{
  display:flex;
  gap:14px;
  width:max-content;
  animation:scroll-ltr linear infinite;
}

.moving-row.rtl{animation-name:scroll-rtl;}

@keyframes scroll-ltr{
  from{transform:translateX(-50%);}
  to{transform:translateX(0);}
}

@keyframes scroll-rtl{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

.symbol{
  width:clamp(var(--symbolMin),10vw,var(--symbolMax));
  height:clamp(var(--symbolMin),10vw,var(--symbolMax));
  object-fit:contain;
  cursor:pointer;
  transition:transform 80ms ease;
}

.symbol:active{transform:scale(0.9);}

/* ===== BRIGHT PRIMARY COLOR TINTS ===== */
.c-bw{filter:none;}

.c-red{
  filter:brightness(0) saturate(100%) invert(15%) sepia(97%) saturate(6000%) hue-rotate(355deg) brightness(100%) contrast(110%);
}
.c-yellow{
  filter:brightness(0) saturate(100%) invert(80%) sepia(90%) saturate(1500%) hue-rotate(5deg) brightness(105%) contrast(105%);
}
.c-blue{
  filter:brightness(0) saturate(100%) invert(25%) sepia(95%) saturate(2500%) hue-rotate(200deg) brightness(100%) contrast(110%);
}
.c-green{
  filter:brightness(0) saturate(100%) invert(45%) sepia(85%) saturate(900%) hue-rotate(90deg) brightness(100%) contrast(110%);
}

.toast{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 14px;
  font-weight:1000;
  display:none;
  box-shadow:var(--shadow);
}

.toast.show{display:block;}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <div class="top-header">
      <div class="brand">
        <h1>Adinkra Movers</h1>
        <p>Tap the correct symbol inside the center window. Each correct row pauses.</p>
      </div>
      <div class="stats">
        <span class="stat" id="levelDisplay">LEVEL 1</span>
        <span class="stat" id="progressCounter">0 / 1</span>
        <span class="stat" id="timerPill">TIME: 0</span>

        <div class="mode">
          <button id="modeNormal" class="active">Normal</button>
          <button id="modeHard">Hard</button>
        </div>

        <button id="resetButton">Restart</button>
      </div>
    </div>

    <div class="targets" id="targetContainer"></div>
  </div>

  <div class="machine">
    <div class="window" id="slotWindow"></div>
    <div id="rowsArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SYMBOLS=[
{name:"Sankofa",file:"Sankofa-egg.png",meaning:"Return and get it"},
{name:"Dwennimmen",file:"Dwennimmen.png",meaning:"Strength & humility"},
{name:"Gye Nyame",file:"Gye-Nyame.png",meaning:"Supremacy of God"},
{name:"Akoma",file:"Akoma-view.png",meaning:"Love & patience"},
{name:"Duafe",file:"Duafe-beauty.png",meaning:"Beauty & care"},
{name:"Odo Nyera",file:"love-will.png",meaning:"Eternal love"}
];

const COLORS=["red","yellow","blue","green"];

const LEVELS=[
{level:1,rows:1,useColors:false,time:16,speed:12},
{level:2,rows:2,useColors:false,time:20,speed:12},
{level:3,rows:3,useColors:false,time:22,speed:11},
{level:4,rows:3,useColors:true,time:22,speed:10},
{level:5,rows:4,useColors:true,time:20,speed:9},
{level:6,rows:4,useColors:true,time:18,speed:8}
];

let currentLevel=0;
let targets=[];
let activeRow=0;
let mode="normal";
let timer;
let secondsLeft=0;

const rowsArea=document.getElementById("rowsArea");
const targetContainer=document.getElementById("targetContainer");
const levelDisplay=document.getElementById("levelDisplay");
const progressCounter=document.getElementById("progressCounter");
const timerPill=document.getElementById("timerPill");
const toast=document.getElementById("toast");
const slotWindow=document.getElementById("slotWindow");

function showToast(msg){
toast.textContent=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),900);
}

function buildLevel(i){
clearInterval(timer);
rowsArea.innerHTML="";
targetContainer.innerHTML="";
const level=LEVELS[i];
levelDisplay.textContent="LEVEL "+level.level;
secondsLeft=level.time;
updateTimer();

targets=[];
activeRow=0;

for(let r=0;r<level.rows;r++){
const sym=SYMBOLS[r%SYMBOLS.length];
const color=level.useColors?COLORS[r%COLORS.length]:"bw";
targets.push({row:r,name:sym.name,color,done:false});

const lane=document.createElement("div");
lane.className="lane";

const row=document.createElement("div");
row.className="moving-row "+(r%2?"rtl":"ltr");
row.style.animationDuration=level.speed+"s";

for(let k=0;k<14;k++){
const s=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
const img=document.createElement("img");
img.src="images/"+s.file;
img.className="symbol "+(level.useColors?("c-"+color):"c-bw");
img.dataset.row=r;
img.dataset.name=s.name;
img.dataset.color=color;
img.onclick=handleClick;
row.appendChild(img);
}

lane.appendChild(row);
rowsArea.appendChild(lane);
}

renderTargets();
timer=setInterval(()=>{
secondsLeft--;
updateTimer();
if(secondsLeft<=0){
showToast("Time's up");
buildLevel(currentLevel);
}
},1000);

if(level.level===4)showToast("Color unlocked!");
}

function updateTimer(){
timerPill.textContent="TIME: "+secondsLeft;
}

function renderTargets(){
targetContainer.innerHTML="";
targets.forEach(t=>{
const div=document.createElement("div");
div.className="target"+(t.done?" done":"");

const img=document.createElement("img");
img.src="images/"+SYMBOLS.find(s=>s.name===t.name).file;
img.className="symbol "+(t.color!=="bw"?"c-"+t.color:"c-bw");

const dot=document.createElement("div");
dot.className="color-dot dot-"+t.color;

div.appendChild(img);
if(t.color!=="bw")div.appendChild(dot);

div.append(t.name);
targetContainer.appendChild(div);
});
progressCounter.textContent=targets.filter(t=>t.done).length+" / "+targets.length;
}

function handleClick(e){
const img=e.target;
const row=parseInt(img.dataset.row);
const name=img.dataset.name;
const target=targets.find(t=>t.row===row);
if(!target||target.done)return;

if(name===target.name){
target.done=true;
img.closest(".moving-row").style.animationPlayState="paused";
renderTargets();
if(targets.every(t=>t.done)){
showToast("Level cleared");
setTimeout(()=>{currentLevel=Math.min(currentLevel+1,LEVELS.length-1);buildLevel(currentLevel);},800);
}
}
}

document.getElementById("resetButton").onclick=()=>{currentLevel=0;buildLevel(currentLevel);};
document.getElementById("modeNormal").onclick=()=>{mode="normal";};
document.getElementById("modeHard").onclick=()=>{mode="hard";};

buildLevel(currentLevel);
</script>

</body>
</html>
