<!-- /index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
  />
  <title>Adinkra Movers</title>

  <style>
    :root{
      --bg: #f5e7d9;
      --card: #fff7ef;
      --ink: #2b1b0e;
      --gold: #ffd966;
      --brown-1:#4a3624;
      --brown-2:#5e3a22;
      --tan-1:#e7d6bf;
      --tan-2:#d8c5aa;
      --border:#cfa776;
      --border-2:#b5835a;
      --shadow: 0 16px 30px rgba(0,0,0,0.16);
      --radius: 28px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px;
      color: var(--ink);
    }

    .app{
      width:min(520px, 100%);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: calc(var(--radius) + 12px);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .header{
      background: var(--ink);
      color: var(--gold);
      padding:18px 18px 14px 18px;
      border-bottom: 2px solid var(--border-2);
    }
    .header-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title h1{
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      margin:0;
    }
    .title p{
      margin:0;
      font-size:0.82rem;
      color:#e6cba0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background: #1f140e;
      border: 1px solid rgba(255,217,102,0.35);
      border-radius: 999px;
      padding:8px 12px;
      font-weight:700;
      font-size:0.9rem;
      color: var(--gold);
      white-space:nowrap;
    }

    .content{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    /* Targets */
    .panel{
      background: #2b1b0e;
      border: 2px solid var(--border-2);
      border-radius: var(--radius);
      padding:14px;
      color: var(--gold);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.45);
    }
    .panel h2{
      font-size:0.9rem;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#e6cba0;
      margin-bottom:10px;
    }
    #targetContainer{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-start;
      min-height:72px;
    }

    .target{
      display:flex;
      align-items:center;
      gap:10px;
      background: var(--brown-1);
      border: 1px solid rgba(255,217,102,0.25);
      padding:10px 12px;
      border-radius: 999px;
    }
    .target img{
      width:48px;
      height:48px;
      object-fit:contain;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.35));
    }
    .target-meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 120px;
    }
    .target-name{
      font-weight:800;
      font-size:0.92rem;
      color:#ffe7b5;
      line-height:1.05;
    }
    .target-meaning{
      font-size:0.75rem;
      color:#e6cba0;
      line-height:1.1;
    }
    .target-color{
      margin-left:auto;
      background:#1f140e;
      padding:4px 10px;
      border-radius:999px;
      font-weight:800;
      font-size:0.75rem;
      color:#ffdfa7;
      border: 1px solid rgba(255,217,102,0.25);
    }

    /* Game area */
    .lanes{
      background: var(--tan-1);
      border: 2px solid #a0714b;
      border-radius: calc(var(--radius) + 8px);
      padding:14px 10px;
      box-shadow: inset 0 0 0 2px #f9efdb;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .lane{
      background: var(--tan-2);
      border-radius: 999px;
      overflow:hidden;
      padding:8px 0;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.18);
    }

    .moving-row{
      display:flex;
      gap:12px;
      align-items:center;
      width:max-content;
      will-change: transform;
      animation: scroll var(--speed, 12s) linear infinite;
    }
    .row-symbol{
      width:64px;
      height:64px;
      object-fit:contain;
      cursor:pointer;
      filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.30));
      transform: translateZ(0);
      transition: transform 80ms ease;
      user-select:none;
    }
    .row-symbol:active{
      transform: scale(0.92);
    }

    .shake{
      animation: shake 260ms ease-in-out;
    }
    @keyframes shake{
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-8px); }
      50%{ transform: translateX(8px); }
      75%{ transform: translateX(-4px); }
    }

    @keyframes scroll{
      from{ transform: translateX(0); }
      to{ transform: translateX(-50%); }
    }

    /* HUD */
    .hud{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: var(--ink);
      border-top: 2px solid var(--border-2);
      padding:12px 14px;
      color: var(--gold);
    }

    .hud-left, .hud-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .counter{
      background: var(--brown-2);
      border: 1px solid rgba(255,217,102,0.25);
      padding:8px 12px;
      border-radius:999px;
      font-weight:900;
      color:#ffdfa7;
      min-width: 92px;
      text-align:center;
    }

    button{
      background:#dbb48b;
      border:2px solid #ffdbb5;
      border-radius:999px;
      padding:9px 14px;
      font-weight:900;
      color: var(--ink);
      cursor:pointer;
      font-size:0.95rem;
      line-height:1;
    }
    button:active{ background:#b5835a; }

    .ghost{
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(255,217,102,0.35);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="title">
          <h1>Adinkra Movers</h1>
          <p>Tap the symbols in the moving lanes to match the targets.</p>
        </div>
        <div class="pill" id="levelDisplay">Level 1</div>
      </div>
    </div>

    <div class="content">
      <div class="panel">
        <h2>Find these</h2>
        <div id="targetContainer"></div>
      </div>

      <div class="lanes" id="rowsArea"></div>
    </div>

    <div class="hud">
      <div class="hud-left">
        <div class="counter" id="progressCounter">0 / 1</div>
      </div>
      <div class="hud-right">
        <button class="ghost" id="pauseButton" type="button">⏸</button>
        <button id="resetButton" type="button">↺ Reset</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Adinkra Movers
     * - Fix: Dwennimmen filename mismatch (repo has Dwennimmen.png)
     * - Fix: seamless scrolling by duplicating lane content (50% translate works)
     */

    const SYMBOLS = [
      { name: "Sankofa", file: "Sankofa-egg.png", meaning: "Return and get it" },
      { name: "Dwennimmen", file: "Dwennimmen.png", meaning: "Strength & humility" }, // ✅ fixed
      { name: "Gye Nyame", file: "Gye-Nyame.png", meaning: "Supremacy of God" },
      { name: "Akoma", file: "Akoma-d.png", meaning: "Love & patience" },
      { name: "Duafe", file: "Duafe-beauty.png", meaning: "Beauty & care" },
      { name: "Odo Nyera", file: "love-will.png", meaning: "Eternal love" }
    ];

    // You can expand this later with more levels
    const LEVELS = [
      { level: 1, rows: 1, targets: 1, allowedSymbols: SYMBOLS.map(s => s.name), targetPool: ["Sankofa"], speedSeconds: 12 }
    ];

    let currentLevelIndex = 0;
    let currentTargets = [];
    let targetsFound = 0;
    let levelComplete = false;
    let paused = false;

    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const resetButton = document.getElementById("resetButton");
    const pauseButton = document.getElementById("pauseButton");

    // Audio (reused; avoids creating a new context per tap)
    let audioCtx = null;

    function getSymbol(symbolName) {
      return SYMBOLS.find(s => s.name === symbolName) || null;
    }

    function symbolSrc(symbol) {
      return `images/${symbol.file}`;
    }

    function createSymbolImage(symbolName) {
      const symbol = getSymbol(symbolName);
      if (!symbol) return null;

      const img = document.createElement("img");
      img.src = symbolSrc(symbol);
      img.alt = symbolName;
      img.className = "row-symbol";
      img.dataset.symbol = symbolName;
      img.addEventListener("click", onSymbolClick);
      return img;
    }

    function onSymbolClick(event) {
      if (levelComplete || paused) return;

      const img = event.currentTarget;
      const symbolName = img.dataset.symbol;

      const targetIndex = currentTargets.findIndex(t => t.symbolName === symbolName);
      if (targetIndex !== -1) {
        playBeep(true);

        currentTargets.splice(targetIndex, 1);
        targetsFound++;

        updateProgress();
        renderTargets();

        if (currentTargets.length === 0) {
          levelComplete = true;
          setRowsAnimationState("paused");
          setTimeout(() => {
            alert(`🎉 Level ${LEVELS[currentLevelIndex].level} Complete!`);
            resetGame();
          }, 150);
        }
      } else {
        playBeep(false);
        img.classList.add("shake");
        setTimeout(() => img.classList.remove("shake"), 260);
      }
    }

    function renderTargets() {
      targetContainer.innerHTML = "";
      currentTargets.forEach(target => {
        const symbol = getSymbol(target.symbolName);
        if (!symbol) return;

        const wrap = document.createElement("div");
        wrap.className = "target";

        const img = document.createElement("img");
        img.src = symbolSrc(symbol);
        img.alt = symbol.name;

        const meta = document.createElement("div");
        meta.className = "target-meta";

        const name = document.createElement("div");
        name.className = "target-name";
        name.textContent = symbol.name;

        const meaning = document.createElement("div");
        meaning.className = "target-meaning";
        meaning.textContent = symbol.meaning;

        meta.appendChild(name);
        meta.appendChild(meaning);

        const color = document.createElement("div");
        color.className = "target-color";
        color.textContent = "BLACK";

        wrap.appendChild(img);
        wrap.appendChild(meta);
        wrap.appendChild(color);
        targetContainer.appendChild(wrap);
      });
    }

    function updateProgress() {
      const total = LEVELS[currentLevelIndex].targets;
      progressCounter.textContent = `${targetsFound} / ${total}`;
    }

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      rowsArea.innerHTML = "";
      levelComplete = false;
      paused = false;
      pauseButton.textContent = "⏸";

      levelDisplay.textContent = `Level ${level.level}`;

      // Targets (simple: pick from targetPool)
      currentTargets = [];
      for (let i = 0; i < level.targets; i++) {
        const pick = level.targetPool[i % level.targetPool.length];
        currentTargets.push({ symbolName: pick });
      }

      targetsFound = 0;
      updateProgress();
      renderTargets();

      // Create lanes
      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";

        const movingRow = document.createElement("div");
        movingRow.className = "moving-row";
        movingRow.style.setProperty("--speed", `${level.speedSeconds}s`);

        // Build a base sequence, then duplicate it for seamless scroll
        const baseCount = 18;
        const baseSymbols = [];
        for (let i = 0; i < baseCount; i++) {
          const randomName = level.allowedSymbols[Math.floor(Math.random() * level.allowedSymbols.length)];
          baseSymbols.push(randomName);
        }

        // Ensure target appears at least once in the lane
        baseSymbols[Math.floor(Math.random() * baseSymbols.length)] = level.targetPool[0];

        const fullSymbols = baseSymbols.concat(baseSymbols); // duplicate to match -50% translation

        fullSymbols.forEach(name => {
          const img = createSymbolImage(name);
          if (img) movingRow.appendChild(img);
        });

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      setRowsAnimationState("running");
    }

    function setRowsAnimationState(state) {
      document.querySelectorAll(".moving-row").forEach(row => {
        row.style.animationPlayState = state;
      });
    }

    function togglePause() {
      if (levelComplete) return;
      paused = !paused;
      setRowsAnimationState(paused ? "paused" : "running");
      pauseButton.textContent = paused ? "▶" : "⏸";
    }

    function playBeep(correct) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const t = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(correct ? 820 : 260, t);

        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.13);
      } catch (_) {
        // ignore
      }
    }

    function resetGame() {
      currentLevelIndex = 0;
      buildLevel(currentLevelIndex);
    }

    resetButton.addEventListener("click", resetGame);
    pauseButton.addEventListener("click", togglePause);

    window.onload = () => resetGame();
  </script>
</body>
</html>
