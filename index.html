<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
  />
  <title>Adinkra Movers</title>

  <style>
    :root{
      --bg: #f2e4d6;
      --ink: #1f140e;
      --muted: rgba(31,20,14,0.70);
      --line: rgba(31,20,14,0.16);
      --paper: rgba(255,255,255,0.70);
      --paper2: rgba(255,255,255,0.42);
      --shadow: 0 12px 26px rgba(0,0,0,0.12);
      --r: 12px;

      --windowW: clamp(240px, 38vw, 380px);

      /* JS sets these */
      --lanePadY: 10px;
      --laneGap: 10px;
      --symbolMin: 72px;
      --symbolMax: 104px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 8px; /* tighter for phones */
    }

    .wrap{
      width: min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap: 8px;
      max-height: 100vh;
      overflow: hidden;
    }

    .top{
      background: linear-gradient(180deg, var(--paper), var(--paper2));
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 10px 10px 8px 10px;
      display:flex;
      flex-direction:column;
      gap: 8px;
      flex: 0 0 auto;
    }

    .top-header{
      display:flex;
      gap: 10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brand{
      flex: 1;
      min-width: 240px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .brand h1{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: clamp(1.05rem, 2.1vw, 1.45rem);
      line-height: 1.0;
    }

    .brand p{
      color: var(--muted);
      line-height: 1.22;
      font-size: clamp(0.90rem, 1.6vw, 1.0rem);
    }

    .controls{
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }

    .chip{
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 1000;
      letter-spacing: 0.2px;
      white-space: nowrap;
      font-size: 0.88rem;
    }

    .mode{
      display:flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow:hidden;
      background: rgba(255,255,255,0.78);
    }
    .mode button{
      border: none;
      background: transparent;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      cursor:pointer;
      color: rgba(31,20,14,0.85);
      font-size: 0.84rem;
    }
    .mode button.active{
      background: rgba(255, 212, 0, 0.35);
      box-shadow: inset 0 0 0 1px rgba(31,20,14,0.10);
      color: var(--ink);
    }

    .btn{
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.85);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      cursor:pointer;
      font-size: 0.84rem;
    }
    .btn:active{ transform: translateY(1px); }

    .targets{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .targets .label{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      color: rgba(31,20,14,0.85);
      white-space: nowrap;
    }

    /* Stable: no reflow jump */
    #targetContainer{
      display:flex;
      gap: 8px;
      align-items:center;
      flex: 1;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .target-tag{
      flex: 0 0 320px;
      max-width: 320px;
      min-width: 320px;
      height: 64px;                 /* lock height to prevent jump */
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.88);
    }
    .target-tag.done{ opacity: 0.60; }
    .target-tag.active{
      outline: 2px solid rgba(255, 212, 0, 0.55);
      outline-offset: 2px;
    }

    .target-tag img{
      width: 46px;
      height: 46px;
      object-fit: contain;
    }

    .target-meta{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }
    .target-meta .name{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      font-size: 0.92rem;
      line-height: 1.05;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    /* reserve space always; reveal by visibility */
    .target-meta .meaning{
      display:block;
      visibility:hidden;
      height: 1.1em;
      color: var(--muted);
      font-size: 0.80rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .target-tag.done .target-meta .meaning{
      visibility: visible;
    }

    .pill{
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.74);
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .color-dot{
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(31,20,14,0.12);
      flex: 0 0 auto;
    }
    .dot-red{ background:#ff2d2d; }
    .dot-yellow{ background:#ffd400; }
    .dot-blue{ background:#0066ff; }
    .dot-green{ background:#00b050; }

    .machine{
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,0.56), rgba(255,255,255,0.34));
      box-shadow: var(--shadow);
      padding: 10px;
      overflow:hidden;
      flex: 1 1 auto;
      min-height: 0;
      transition: opacity 220ms ease;
    }

    .window{
      position:absolute;
      left: 50%;
      top: 10px;
      bottom: 10px;
      width: var(--windowW);
      transform: translateX(-50%);
      border-radius: 0px;
      border: 3px solid rgba(31,20,14,0.35);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.65),
        0 10px 18px rgba(0,0,0,0.10);
      pointer-events:none;
      z-index: 4;
    }

    .lane{
      position: relative;
      overflow:hidden;
      border-radius: 0px;
      border: 1px solid rgba(31,20,14,0.18);
      background: rgba(255,255,255,0.92);
      padding: var(--lanePadY) 0;
      margin: var(--laneGap) 0;
    }

    .lane::before,
    .lane::after{
      content:"";
      position:absolute;
      top:0; bottom:0;
      width: 70px;
      z-index: 2;
      pointer-events:none;
    }
    .lane::before{
      left:0;
      background: linear-gradient(to right, rgba(242,228,214,0.98), rgba(242,228,214,0));
    }
    .lane::after{
      right:0;
      background: linear-gradient(to left, rgba(242,228,214,0.98), rgba(242,228,214,0));
    }

    .lane.good{
      border-color: rgba(42,157,88,0.95);
      box-shadow: inset 0 0 0 2px rgba(42,157,88,0.14);
    }
    .lane.bad{
      border-color: rgba(214,69,69,0.95);
      box-shadow: inset 0 0 0 2px rgba(214,69,69,0.12);
    }
    .lane.paused{
      border-color: rgba(31,20,14,0.30);
      background: rgba(255,255,255,0.97);
    }

    .moving-row{
      display:flex;
      align-items:center;
      gap: 14px;
      width: max-content;
      will-change: transform;
      animation-duration: var(--speed, 12s);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: running;
    }
    .moving-row.ltr{ animation-name: scroll-ltr; }
    .moving-row.rtl{ animation-name: scroll-rtl; }

    @keyframes scroll-ltr{
      from{ transform: translateX(-50%); }
      to{ transform: translateX(0); }
    }
    @keyframes scroll-rtl{
      from{ transform: translateX(0); }
      to{ transform: translateX(-50%); }
    }

    .symbol{
      width: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      height: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      object-fit: contain;
      cursor:pointer;
      user-select:none;
      transform: translateZ(0);
      transition: transform 80ms ease;
    }
    .symbol:active{ transform: scale(0.92); }

    .symbol.target{
      outline: 2px solid rgba(255, 212, 0, 0.55);
      outline-offset: 2px;
      box-shadow: 0 0 10px rgba(255, 212, 0, 0.70);
      border-radius: 8px;
    }

    .shake{ animation: shake 260ms ease-in-out; }
    @keyframes shake{
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-8px); }
      50%{ transform: translateX(8px); }
      75%{ transform: translateX(-4px); }
    }

    /* IMPORTANT: no filter on .symbol; filter lives in c-* classes */
    .c-bw{
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    /* Bright primary tints for pure black icons */
    .c-red{
      filter: brightness(0) saturate(100%) invert(15%) sepia(97%) saturate(6000%) hue-rotate(355deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }
    .c-yellow{
      filter: brightness(0) saturate(100%) invert(80%) sepia(90%) saturate(1500%) hue-rotate(5deg) brightness(105%) contrast(105%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }
    .c-blue{
      filter: brightness(0) saturate(100%) invert(25%) sepia(95%) saturate(2500%) hue-rotate(200deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }
    .c-green{
      filter: brightness(0) saturate(100%) invert(45%) sepia(85%) saturate(900%) hue-rotate(90deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow);
      border-radius: 999px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      display:none;
      z-index: 999;
      max-width: min(92vw, 700px);
      text-align:center;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .toast.show{ display:block; }

    @media (prefers-reduced-motion: reduce){
      .moving-row{ animation: none; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="top-header">
        <div class="brand">
          <h1>Adinkra Movers</h1>
          <p>
            Tap the correct symbol on the correct row — taps only count inside the center window.
            Each correct row pauses. Timer is per level.
          </p>
        </div>

        <div class="controls">
          <span class="chip" id="levelDisplay">LEVEL 1</span>
          <span class="chip" id="progressCounter">0 / 1</span>
          <span class="chip" id="timerPill">TIME: 0</span>

          <div class="mode" aria-label="Mode">
            <button id="modeNormal" type="button" class="active">Normal</button>
            <button id="modeHard" type="button">Hard</button>
          </div>

          <button class="btn" id="resetButton" type="button">Restart</button>
        </div>
      </div>

      <div class="targets">
        <div class="label">Find</div>
        <div id="targetContainer"></div>
      </div>
    </div>

    <div class="machine" id="machine">
      <div class="window" id="slotWindow" aria-hidden="true"></div>
      <div id="rowsArea"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SYMBOLS = [
      { name: "Sankofa", file: "Sankofa-egg.png", meaning: "Return and get it" },
      { name: "Dwennimmen", file: "Dwennimmen.png", meaning: "Strength & humility" },
      { name: "Gye Nyame", file: "Gye-Nyame.png", meaning: "Supremacy of God" },
      { name: "Akoma", file: "Akoma-d.png", meaning: "Love & patience" },
      { name: "Duafe", file: "Duafe-beauty.png", meaning: "Beauty & care" },
      { name: "Odo Nyera", file: "love-will.png", meaning: "Eternal love" }
    ];

    const COLORS = ["red", "yellow", "blue", "green"];
    const MODES = { NORMAL: "NORMAL", HARD: "HARD" };

    // Make targets appear more often to reduce “waiting isn’t my fault”.
    const TARGET_APPEAR_EVERY_SECONDS = 2.0;

    // Max 4 rows; colors begin at 4; level 6 has colored decoys (not in target color).
    const LEVELS = [
      { level: 1, rows: 1, useColors: false, levelTimeSeconds: 20, baseSpeedSeconds: 12, baseLen: 18, coloredDistractors: false },
      { level: 2, rows: 2, useColors: false, levelTimeSeconds: 22, baseSpeedSeconds: 12, baseLen: 18, coloredDistractors: false },
      { level: 3, rows: 3, useColors: false, levelTimeSeconds: 24, baseSpeedSeconds: 11, baseLen: 20, coloredDistractors: false },
      { level: 4, rows: 3, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 10, baseLen: 20, coloredDistractors: false },
      { level: 5, rows: 4, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 9,  baseLen: 22, coloredDistractors: false },
      { level: 6, rows: 4, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 8,  baseLen: 22, coloredDistractors: true, coloredDistractorRate: 0.18 }
    ];

    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const timerPill = document.getElementById("timerPill");
    const resetButton = document.getElementById("resetButton");
    const slotWindow = document.getElementById("slotWindow");
    const toast = document.getElementById("toast");
    const machine = document.getElementById("machine");
    const modeNormalBtn = document.getElementById("modeNormal");
    const modeHardBtn = document.getElementById("modeHard");

    let currentLevelIndex = 0;
    let mode = MODES.NORMAL;

    let targets = [];
    let activeRowIndex = 0;

    let levelComplete = false;
    let secondsLeft = 0;
    let timerId = null;

    let audioCtx = null;

    function preloadImages() {
      for (const s of SYMBOLS) {
        const img = new Image();
        img.src = `images/${s.file}`;
      }
    }

    function applyResponsiveSizing(levelRows) {
      const root = document.documentElement.style;
      const vh = window.innerHeight || 800;

      // Keep everything on one screen. This favors Android mid-range screens.
      const maxSymbol = Math.min(110, Math.floor(vh / (levelRows * 1.6)));
      const minSymbol = Math.max(54, Math.floor(maxSymbol * 0.78));
      const pad = Math.max(4, Math.floor(maxSymbol * 0.10));
      const gap = Math.max(4, Math.floor(maxSymbol * 0.10));

      root.setProperty("--symbolMax", `${maxSymbol}px`);
      root.setProperty("--symbolMin", `${minSymbol}px`);
      root.setProperty("--lanePadY", `${pad}px`);
      root.setProperty("--laneGap", `${gap}px`);
    }

    function showToast(msg, ms = 900) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), ms);
    }

    function getSymbol(name) {
      return SYMBOLS.find(s => s.name === name) || null;
    }

    function rowDirection(rowIndex) {
      return rowIndex % 2 === 0 ? "ltr" : "rtl";
    }

    function colorClass(color) {
      return color === "bw" ? "c-bw" : ("c-" + color);
    }

    function dotClass(color) {
      return "dot-" + color;
    }

    function isInsideSlotWindow(imgEl) {
      const w = slotWindow.getBoundingClientRect();
      const r = imgEl.getBoundingClientRect();
      const cx = r.left + (r.width / 2);
      const cy = r.top + (r.height / 2);
      return cx >= w.left && cx <= w.right && cy >= w.top && cy <= w.bottom;
    }

    function flashLane(rowIndex, kind) {
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (!lane) return;
      lane.classList.remove("good", "bad");
      lane.classList.add(kind === "bad" ? "bad" : "good");
      setTimeout(() => lane.classList.remove("good", "bad"), 220);
    }

    function pauseRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (row) row.style.animationPlayState = "paused";
      if (lane) lane.classList.add("paused");
    }

    function setAllRowsState(state) {
      document.querySelectorAll(".moving-row").forEach(r => r.style.animationPlayState = state);
    }

    function beep(correct) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const t = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(correct ? 860 : 240, t);

        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.055, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.12);
      } catch (_) {}
    }

    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }

    function startLevelTimer(levelSeconds) {
      stopTimer();
      secondsLeft = levelSeconds;
      updateHUD();

      timerId = setInterval(() => {
        if (levelComplete) return;
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          secondsLeft = 0;
          updateHUD();
          onTimeUp();
          return;
        }
        updateHUD();
      }, 1000);
    }

    function onTimeUp() {
      stopTimer();
      showToast("Time’s up — try again", 1100);
      restartLevel();
    }

    function fadeRebuild(nextIndex) {
      machine.style.opacity = "0";
      setTimeout(() => {
        buildLevel(nextIndex);
        machine.style.opacity = "1";
      }, 220);
    }

    function onLevelWin() {
      levelComplete = true;
      stopTimer();
      setAllRowsState("paused");

      const levelNum = LEVELS[currentLevelIndex].level;
      showToast(`Level ${levelNum} cleared`, 1000);

      setTimeout(() => {
        const nextIndex = (currentLevelIndex >= LEVELS.length - 1) ? 0 : (currentLevelIndex + 1);
        currentLevelIndex = nextIndex;
        fadeRebuild(currentLevelIndex);
      }, 950);
    }

    function updateHUD() {
      const level = LEVELS[currentLevelIndex];
      const doneCount = targets.filter(t => t.done).length;
      levelDisplay.textContent = `LEVEL ${level.level}`;
      progressCounter.textContent = `${doneCount} / ${targets.length}`;
      timerPill.textContent = `TIME: ${secondsLeft}`;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildTargetsForLevel(level) {
      const names = shuffle(SYMBOLS.map(s => s.name).slice());
      const chosen = [];

      for (let r = 0; r < level.rows; r++) {
        const symbolName = names[r % names.length];
        const color = level.useColors ? COLORS[r % COLORS.length] : "bw";
        chosen.push({ rowIndex: r, symbolName, color, done: false });
      }
      return chosen;
    }

    function computeTargetCount(level, speedSeconds, baseLen) {
      // +1 buffer and min 4 as recommended for perceived fairness.
      const symPerSecond = baseLen / Math.max(1, speedSeconds);
      const maxGapSymbols = Math.max(3, Math.ceil(TARGET_APPEAR_EVERY_SECONDS * symPerSecond));
      const needed = Math.ceil(baseLen / maxGapSymbols) + 1;
      return Math.max(4, needed);
    }

    function pickTargetPositionsEven({ baseLen, targetCount }) {
      // stricter even spacing, smaller jitter (wrap-around feel)
      const positions = [];
      const step = Math.floor(baseLen / (targetCount + 1));

      for (let i = 1; i <= targetCount; i++) {
        const jitter = Math.floor(Math.random() * (step * 0.3));
        const p = (i * step + jitter) % baseLen;
        positions.push(p);
      }

      // ensure uniqueness
      const uniq = Array.from(new Set(positions));
      while (uniq.length < targetCount) {
        const p = Math.floor(Math.random() * baseLen);
        if (!uniq.includes(p)) uniq.push(p);
      }
      uniq.sort((a,b) => a-b);
      return uniq;
    }

    function buildRowSequence({
      level,
      speedSeconds,
      baseLen,
      targetName,
      targetColor
    }) {
      const items = new Array(baseLen).fill(null);

      const targetCount = computeTargetCount(level, speedSeconds, baseLen);
      const positions = pickTargetPositionsEven({ baseLen, targetCount });

      for (const p of positions) {
        items[p] = {
          name: targetName,
          color: level.useColors ? targetColor : "bw",
          isTarget: true
        };
      }

      let last = null;
      let streak = 0;

      for (let i = 0; i < baseLen; i++) {
        if (items[i]) {
          const nm = items[i].name;
          if (nm === last) streak += 1;
          else { last = nm; streak = 1; }
          continue;
        }

        let pick = null;
        for (let tries = 0; tries < 60; tries++) {
          const candidate = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].name;
          if (candidate === targetName) continue;
          if (candidate === last && streak >= 2) continue;
          pick = candidate;
          break;
        }
        if (!pick) pick = SYMBOLS[0].name === targetName ? SYMBOLS[1].name : SYMBOLS[0].name;

        let color = "bw";

        // Levels 4–5: distractors BW (your vision)
        // Level 6: colored decoys, avoid matching targetColor to reduce confusion
        if (level.useColors && level.coloredDistractors) {
          const rate = typeof level.coloredDistractorRate === "number" ? level.coloredDistractorRate : 0.18;
          if (Math.random() < rate) {
            const options = COLORS.filter(c => c !== targetColor);
            color = options[Math.floor(Math.random() * options.length)];
          }
        }

        items[i] = { name: pick, color, isTarget: false };

        if (pick === last) streak += 1;
        else { last = pick; streak = 1; }
      }

      return items.concat(items);
    }

    function renderTargets() {
      targetContainer.innerHTML = "";

      for (const t of targets) {
        const symbol = getSymbol(t.symbolName);
        if (!symbol) continue;

        const tag = document.createElement("div");
        tag.className = "target-tag";

        const highlight =
          !t.done &&
          !levelComplete &&
          (mode === MODES.NORMAL || t.rowIndex === activeRowIndex);

        if (highlight) tag.classList.add("active");
        if (t.done) tag.classList.add("done");

        const img = document.createElement("img");
        img.alt = symbol.name;
        img.src = `images/${symbol.file}`;
        img.classList.add(colorClass(t.color));

        const dot = document.createElement("div");
        dot.className = "color-dot " + (t.color === "bw" ? "" : dotClass(t.color));
        if (t.color === "bw") dot.style.display = "none";

        const meta = document.createElement("div");
        meta.className = "target-meta";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = symbol.name;

        const meaning = document.createElement("div");
        meaning.className = "meaning";
        meaning.textContent = symbol.meaning;

        const rowPill = document.createElement("span");
        rowPill.className = "pill";
        rowPill.textContent = `Row ${t.rowIndex + 1}`;

        meta.appendChild(name);
        meta.appendChild(meaning);

        tag.appendChild(img);
        tag.appendChild(dot);
        tag.appendChild(meta);
        tag.appendChild(rowPill);

        targetContainer.appendChild(tag);
      }

      updateHUD();
    }

    function onSymbolClick(e) {
      if (levelComplete) return;

      const img = e.currentTarget;

      if (!isInsideSlotWindow(img)) {
        beep(false);
        flashLane(Number(img.dataset.row), "bad");
        img.classList.add("shake");
        setTimeout(() => img.classList.remove("shake"), 260);
        return;
      }

      const rowIndex = Number(img.dataset.row);
      const name = img.dataset.name;
      const color = img.dataset.color;

      if (mode === MODES.HARD && rowIndex !== activeRowIndex) {
        beep(false);
        flashLane(rowIndex, "bad");
        img.classList.add("shake");
        setTimeout(() => img.classList.remove("shake"), 260);
        return;
      }

      const target = targets.find(t => t.rowIndex === rowIndex);
      if (!target || target.done) {
        beep(false);
        flashLane(rowIndex, "bad");
        img.classList.add("shake");
        setTimeout(() => img.classList.remove("shake"), 260);
        return;
      }

      const symbolMatch = name === target.symbolName;
      const colorMatch = (target.color === "bw") ? (color === "bw") : (color === target.color);

      if (!symbolMatch || !colorMatch) {
        beep(false);
        flashLane(rowIndex, "bad");
        img.classList.add("shake");
        setTimeout(() => img.classList.remove("shake"), 260);
        return;
      }

      beep(true);
      flashLane(rowIndex, "good");

      target.done = true;
      pauseRow(rowIndex);

      if (mode === MODES.HARD) {
        const next = targets.find(t => !t.done);
        activeRowIndex = next ? next.rowIndex : 0;
      }

      renderTargets();

      if (targets.every(t => t.done)) {
        onLevelWin();
      }
    }

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      applyResponsiveSizing(level.rows);

      levelComplete = false;
      rowsArea.innerHTML = "";

      targets = buildTargetsForLevel(level);
      activeRowIndex = 0;

      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.dataset.row = String(r);

        const movingRow = document.createElement("div");
        movingRow.className = `moving-row ${rowDirection(r)}`;
        movingRow.dataset.row = String(r);

        const speedSeconds = Math.max(6, level.baseSpeedSeconds - (r % 2));
        movingRow.style.setProperty("--speed", `${speedSeconds}s`);

        const rowTarget = targets.find(t => t.rowIndex === r);
        const seq = buildRowSequence({
          level,
          speedSeconds,
          baseLen: level.baseLen,
          targetName: rowTarget.symbolName,
          targetColor: rowTarget.color
        });

        for (const it of seq) {
          const s = getSymbol(it.name);
          if (!s) continue;

          const el = document.createElement("img");
          el.src = `images/${s.file}`;
          el.alt = it.name;
          el.className = `symbol ${colorClass(it.color)}${it.isTarget ? " target" : ""}`;

          el.dataset.row = String(r);
          el.dataset.name = it.name;
          el.dataset.color = it.color;
          el.dataset.isTarget = it.isTarget ? "true" : "false";

          el.setAttribute(
            "aria-label",
            it.color === "bw" ? `${it.name} black and white` : `${it.name} ${it.color}`
          );

          el.addEventListener("click", onSymbolClick);
          movingRow.appendChild(el);
        }

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      renderTargets();
      setAllRowsState("running");
      startLevelTimer(level.levelTimeSeconds);

      if (level.level === 4) showToast("Color unlocked", 1200);
      if (level.level === 6) showToast("Expert: colored decoys", 1200);
    }

    function restartLevel() {
      stopTimer();
      buildLevel(currentLevelIndex);
    }

    function restartFromLevel1() {
      stopTimer();
      currentLevelIndex = 0;
      buildLevel(currentLevelIndex);
    }

    function setMode(newMode) {
      mode = newMode;
      modeNormalBtn.classList.toggle("active", mode === MODES.NORMAL);
      modeHardBtn.classList.toggle("active", mode === MODES.HARD);

      const next = targets.find(t => !t.done);
      activeRowIndex = next ? next.rowIndex : 0;

      renderTargets();
      showToast(mode === MODES.NORMAL ? "Normal: any order" : "Hard: in order", 900);
    }

    resetButton.addEventListener("click", restartFromLevel1);
    modeNormalBtn.addEventListener("click", () => setMode(MODES.NORMAL));
    modeHardBtn.addEventListener("click", () => setMode(MODES.HARD));
    window.addEventListener("resize", () => applyResponsiveSizing(LEVELS[currentLevelIndex].rows));

    window.onload = () => {
      preloadImages();
      setMode(MODES.NORMAL);
      buildLevel(currentLevelIndex);
    };
  </script>
</body>
</html>
