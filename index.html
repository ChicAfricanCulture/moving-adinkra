<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Adinkra Movers</title>

  <style>
    :root {
      --bg: #f2e4d6;
      --ink: #1f140e;
      --muted: rgba(31,20,14,0.68);
      --line: rgba(31,20,14,0.16);
      --paper: rgba(255,255,255,0.72);
      --paper2: rgba(255,255,255,0.44);
      --shadow: 0 12px 26px rgba(0,0,0,0.12);
      --r: 12px;

      /* Ghana-inspired accent colors */
      --gold: #D4AF37;
      --kente-red: #B22222;
      --earth: #8B4513;
      --savanna: #C19A6B;

      --windowW: clamp(170px, 22vw, 240px);
      --lanePadY: 10px;
      --laneGap: 10px;
      --symbolMin: 62px;
      --symbolMax: 92px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
      transition: background-color 0.1s ease;
    }

    .wrap {
      width: min(1400px, 98vw);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100vh;
      padding: 10px;
    }

    .top {
      background: linear-gradient(180deg, var(--gold), var(--earth));
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 auto;
      overflow: hidden;
      color: white;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .top-header {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand h1 {
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: clamp(1.05rem, 1.8vw, 1.45rem);
      line-height: 1.0;
    }

    .brand p {
      color: rgba(255,255,255,0.9);
      line-height: 1.2;
      font-size: clamp(0.86rem, 1.2vw, 0.98rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      background: rgba(255,255,255,0.90);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 1000;
      letter-spacing: 0.2px;
      white-space: nowrap;
      font-size: 0.88rem;
      color: var(--ink);
      text-shadow: none;
    }

    .mode {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.90);
    }

    .mode button {
      border: none;
      background: transparent;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      cursor: pointer;
      color: rgba(31,20,14,0.85);
      font-size: 0.84rem;
    }

    .mode button.active {
      background: var(--gold);
      box-shadow: inset 0 0 0 1px rgba(31,20,14,0.10);
      color: var(--ink);
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.90);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      cursor: pointer;
      font-size: 0.84rem;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .targets {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.3);
      padding-top: 8px;
    }

    .targets .label {
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      color: white;
      white-space: nowrap;
    }

    #targetContainer {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .target-tag {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.95);
      height: 62px;
      min-width: 280px;
      max-width: 360px;
      flex: 1 1 280px;
      transition: all 0.2s ease;
    }

    .target-tag.done {
      opacity: 0.62;
    }

    .target-tag.active {
      outline: 4px solid var(--gold);
      outline-offset: 2px;
      transform: scale(1.02);
      box-shadow: 0 0 20px var(--gold);
    }

    .target-tag img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .target-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .target-meta .name {
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      font-size: 0.92rem;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .target-meta .meaning {
      display: block;
      visibility: hidden;
      height: 1.1em;
      color: var(--muted);
      font-size: 0.80rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .target-tag.done .target-meta .meaning {
      visibility: visible;
    }
/* ✅ FIX: make target symbol name readable (no white-on-white / embossed look) */
.target-tag .target-meta .name{
  color: var(--ink) !important;
  text-shadow:
    -1px -1px 0 rgba(255,255,255,0.65),
     1px -1px 0 rgba(255,255,255,0.65),
    -1px  1px 0 rgba(255,255,255,0.65),
     1px  1px 0 rgba(255,255,255,0.65),
     0px  2px 0 rgba(0,0,0,0.10);
}

/* ✅ FIX: meaning line also gets explicit color */
.target-tag .target-meta .meaning{
  color: rgba(31,20,14,0.72) !important;
  text-shadow: none;
}
    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.76);
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      font-size: 0.76rem;
      white-space: nowrap;
      flex: 0 0 auto;
    }
/* ✅ FIX: Row pill text readable (no white-on-white) */
.target-tag .pill{
  color: var(--ink) !important;
  text-shadow: none;
}.target-tag .pill{
  background: rgba(255,255,255,0.92);
  border-color: rgba(31,20,14,0.22);
}
    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(31,20,14,0.12);
      flex: 0 0 auto;
    }

    .dot-red { background: #ff2d2d; }
    .dot-yellow { background: #ffd400; }
    .dot-blue { background: #0066ff; }
    .dot-green { background: #00b050; }

    .machine {
      position: relative;
      border: 8px solid #4a3729;
      border-radius: 20px;
      background: linear-gradient(145deg, #2a1e14, #1a120b);
      box-shadow:
        0 20px 30px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(212, 175, 55, 0.3);
      padding: 10px;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 0;
      transition: opacity 180ms ease;
    }

    .window {
      position: absolute;
      left: 50%;
      top: 10px;
      bottom: 10px;
      width: var(--windowW);
      transform: translateX(-50%);
      border-radius: 0px;
      border: 4px solid var(--gold);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.65),
        0 0 20px var(--gold);
      pointer-events: none;
      z-index: 4;
      animation: windowPulse 2s infinite;
    }

    @keyframes windowPulse {
      0% { border-color: var(--gold); opacity: 0.8; }
      50% { border-color: #FFD700; opacity: 1; box-shadow: 0 0 30px gold; }
      100% { border-color: var(--gold); opacity: 0.8; }
    }

    /* ✅ FIXED: no duplicate ::before / ::after conflict.
       We keep the track decoration in ::before and do the fades via layered backgrounds. */
    .lane {
      position: relative;
      overflow: hidden;
      border-radius: 0px;
      border: 1px solid rgba(31,20,14,0.18);
      background:
        linear-gradient(to right, rgba(242,228,214,0.98), rgba(242,228,214,0) 70px),
        linear-gradient(to left,  rgba(242,228,214,0.98), rgba(242,228,214,0) 70px),
        rgba(255,255,255,0.94);
      padding: var(--lanePadY) 0;
      margin: var(--laneGap) 0;
    }

    .lane::before {
      content: "▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬";
      color: rgba(0,0,0,0.1);
      font-size: 20px;
      position: absolute;
      width: 100%;
      text-align: center;
      letter-spacing: 20px;
      bottom: 0;
      pointer-events: none;
      z-index: 1;
    }

    .lane.good {
      border-color: rgba(42,157,88,0.95);
      box-shadow: inset 0 0 0 2px rgba(42,157,88,0.14);
    }

    .moving-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: max-content;
      will-change: transform;
      animation-duration: var(--speed, 12s);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: running;
    }

    .moving-row.ltr { animation-name: scroll-ltr; }
    .moving-row.rtl { animation-name: scroll-rtl; }

    @keyframes scroll-ltr {
      from { transform: translateX(0); }
      to { transform: translateX(-33.333%); }
    }

    @keyframes scroll-rtl {
      from { transform: translateX(-33.333%); }
      to { transform: translateX(0); }
    }

    .symbol {
      width: clamp(var(--symbolMin), 7vw, var(--symbolMax));
      height: clamp(var(--symbolMin), 7vw, var(--symbolMax));
      object-fit: contain;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none; /* ✅ iOS polish */
      transform: translateZ(0);
      transition: all 0.1s ease;
      pointer-events: auto;
      touch-action: manipulation;
      border-radius: 8px;
    }

    .symbol:active {
      transform: scale(0.9);
      opacity: 0.8;
    }

    .symbol.in-window {
      filter: drop-shadow(0 0 12px var(--gold));
      transform: scale(1.08);
      transition: all 0.1s ease;
    }

    .symbol.target-highlight {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
      box-shadow: 0 0 20px gold;
    }

    .c-bw {
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .c-red {
      filter: brightness(0) saturate(100%) invert(15%) sepia(97%) saturate(6000%) hue-rotate(355deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .c-yellow {
      filter: brightness(0) saturate(100%) invert(80%) sepia(90%) saturate(1500%) hue-rotate(5deg) brightness(105%) contrast(105%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .c-blue {
      filter: brightness(0) saturate(100%) invert(25%) sepia(95%) saturate(2500%) hue-rotate(200deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .c-green {
      filter: brightness(0) saturate(100%) invert(45%) sepia(85%) saturate(900%) hue-rotate(90deg) brightness(100%) contrast(110%)
              drop-shadow(0 2px 3px rgba(0,0,0,0.10));
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow);
      border-radius: 999px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      display: none;
      z-index: 999;
      max-width: min(92vw, 820px);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show { display: block; }

    /* Tutorial overlay */
    .tutorial-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s;
    }

    .tutorial-card {
      background: var(--bg);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      text-align: center;
      border: 4px solid var(--gold);
      box-shadow: 0 0 30px gold;
    }

    .tutorial-card h2 {
      color: var(--earth);
      margin-bottom: 20px;
      font-size: 28px;
    }

    .tutorial-card ul {
      text-align: left;
      margin: 20px 0;
      list-style-type: none;
    }

    .tutorial-card li {
      margin: 15px 0;
      padding-left: 30px;
      position: relative;
      font-size: 18px;
    }

    .tutorial-card li::before {
      content: "👆";
      position: absolute;
      left: 0;
    }

    .tutorial-card li:nth-child(2)::before { content: "🎯"; }
    .tutorial-card li:nth-child(3)::before { content: "✨"; }

    .tutorial-btn {
      background: var(--gold);
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      border-bottom: 4px solid var(--earth);
    }

    .tutorial-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Level 1 tutorial hint */
    .tutorial-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 0 black;
      z-index: 10;
      animation: bounce 1s infinite;
      pointer-events: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -60%); }
    }

    .success-flash {
      animation: successFlash 0.3s ease;
    }

    @keyframes successFlash {
      0% { background-color: rgba(212, 175, 55, 0); }
      50% { background-color: rgba(212, 175, 55, 0.3); }
      100% { background-color: rgba(212, 175, 55, 0); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top" id="top">
      <div class="top-header">
        <div class="brand">
          <h1>Adinkra Movers</h1>
          <p>Tap the matching symbol in the golden window</p>
        </div>


        <div class="controls">
          <span class="chip" id="levelDisplay">LEVEL 1</span>
          <span class="chip" id="progressCounter">0 / 1</span>
          <span class="chip" id="timerPill">TIME: 0</span>

          <div class="mode" aria-label="Mode">
            <button id="modeNormal" type="button" class="active">Normal</button>
            <button id="modeHard" type="button">Hard</button>
          </div>

          <button class="btn" id="resetButton" type="button">Restart</button>
        </div>
      </div>

      <div class="targets">
        <div class="label">Find</div>
        <div id="targetContainer"></div>
      </div>
    </div>

    <div class="machine" id="machine">
      <div class="window" id="slotWindow" aria-hidden="true"></div>
      <div id="rowsArea"></div>
      <div class="tutorial-hint" id="tutorialHint">👆 TAP HERE</div>
    </div>
  </div>
<div style="text-align:center; font-size:0.85rem; margin-top:6px; opacity:0.75;">
  Created by 
  <a href="https://www.theafricangourmet.com/p/home.html" target="_blank" style="color:var(--ink); font-weight:600; text-decoration:underline;">
    African Gourmet Archives
  </a>
  ·
  <a href="https://chicafricanculture.github.io/african-foodways-data/" target="_blank" style="color:var(--ink); font-weight:600; text-decoration:underline;">
    GitHub
  </a>
</div>
  <div class="toast" id="toast"></div>

  <script>
    const SYMBOLS = [
      { name: "Sankofa", file: "Sankofa-egg.png", meaning: "Return and get it" },
      { name: "Dwennimmen", file: "Dwennimmen.png", meaning: "Strength & humility" },
      { name: "Gye Nyame", file: "Gye-Nyame.png", meaning: "Supremacy of God" },
      { name: "Akoma", file: "Akoma-view.png", meaning: "Love & patience" },
      { name: "Duafe", file: "Duafe-beauty.png", meaning: "Beauty & care" },
      { name: "Odo Nyera", file: "love-will.png", meaning: "Eternal love" }
    ];

    const COLORS = ["red", "yellow", "blue", "green"];
    const MODES = { NORMAL: "NORMAL", HARD: "HARD" };

    const TARGET_APPEAR_EVERY_SECONDS = 2.2;

    const LEVELS = [
      { level: 1, rows: 1, useColors: false, levelTimeSeconds: 30, baseSpeedSeconds: 15, baseLen: 24, coloredDistractors: false },
      { level: 2, rows: 2, useColors: false, levelTimeSeconds: 25, baseSpeedSeconds: 13, baseLen: 24, coloredDistractors: false },
      { level: 3, rows: 3, useColors: false, levelTimeSeconds: 24, baseSpeedSeconds: 12, baseLen: 24, coloredDistractors: false },
      { level: 4, rows: 3, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 11, baseLen: 24, coloredDistractors: false },
      { level: 5, rows: 4, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 10, baseLen: 26, coloredDistractors: false },
      { level: 6, rows: 4, useColors: true,  levelTimeSeconds: 24, baseSpeedSeconds: 9,  baseLen: 26, coloredDistractors: true, coloredDistractorRate: 0.18 }
    ];

    const topEl = document.getElementById("top");
    const machineEl = document.getElementById("machine");
    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const timerPill = document.getElementById("timerPill");
    const resetButton = document.getElementById("resetButton");
    const slotWindow = document.getElementById("slotWindow");
    const toast = document.getElementById("toast");
    const modeNormalBtn = document.getElementById("modeNormal");
    const modeHardBtn = document.getElementById("modeHard");
    const tutorialHint = document.getElementById("tutorialHint");

    let currentLevelIndex = 0;
    let mode = MODES.NORMAL;
    let targets = [];
    let activeRowIndex = 0;
    let levelComplete = false;
    let secondsLeft = 0;
    let timerId = null;
    let audioCtx = null;
    let firstSuccessThisLevel = true;

    function showToast(msg, ms = 1500) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), ms);
    }

    function showTutorial() {
      if (localStorage.getItem('adinkraTutorialShown')) return;

      const overlay = document.createElement('div');
      overlay.className = 'tutorial-overlay';
      overlay.innerHTML = `
        <div class="tutorial-card">
          <h2>🎮 Welcome!</h2>
          <ul>
            <li>Watch symbols move through the <span style="color: var(--gold);">★ GOLDEN WINDOW ★</span></li>
            <li>Tap when you see the matching symbol</li>
            <li>Complete all targets to advance</li>
          </ul>
          <p style="color: var(--earth);">Level 1 is slow to learn. Take your time!</p>
          <button class="tutorial-btn" id="startTutorial">Let's Play!</button>
        </div>
      `;
      document.body.appendChild(overlay);

      document.getElementById('startTutorial').addEventListener('click', () => {
        overlay.remove();
        localStorage.setItem('adinkraTutorialShown', 'true');
        tutorialHint.style.display = 'block';
        setTimeout(() => {
          tutorialHint.style.display = 'none';
        }, 5000);
      });
    }

    function preloadImages() {
      for (const s of SYMBOLS) {
        const img = new Image();
        img.src = `images/${s.file}`;
      }
    }

    function attachImageFallback(img, originalFile) {
      const attempts = new Set();
      const candidates = [
        originalFile,
        originalFile.replace(/-view(?=\.)/i, "-d"),
        originalFile.replace(/-d(?=\.)/i, "-view"),
        originalFile.replace(/_/g, "-"),
        originalFile.replace(/-/g, "_"),
        originalFile.toLowerCase(),
      ];

      let idx = 0;
      img.addEventListener("error", () => {
        while (idx < candidates.length && attempts.has(candidates[idx])) idx++;
        if (idx >= candidates.length) {
          console.warn("Image failed to load after fallbacks:", originalFile);
          return;
        }
        const next = candidates[idx++];
        attempts.add(next);
        img.src = `images/${next}`;
      });
    }

    function getSymbol(name) {
      return SYMBOLS.find(s => s.name === name) || null;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function rowDirection(rowIndex) {
      return rowIndex % 2 === 0 ? "ltr" : "rtl";
    }

    function colorClass(color) {
      return color === "bw" ? "c-bw" : ("c-" + color);
    }

    function dotClass(color) {
      return "dot-" + color;
    }

    function isInWindow(imgEl) {
      const windowRect = slotWindow.getBoundingClientRect();
      const imgRect = imgEl.getBoundingClientRect();

      const imgCenterX = imgRect.left + imgRect.width / 2;
      const imgCenterY = imgRect.top + imgRect.height / 2;

      return imgCenterX >= windowRect.left &&
             imgCenterX <= windowRect.right &&
             imgCenterY >= windowRect.top &&
             imgCenterY <= windowRect.bottom;
    }

    // ✅ PERFORMANCE: Highlight only relevant symbols (Hard = active row only),
    // and throttle to 100ms instead of 50ms.
    function updateWindowHighlights() {
      const selector =
        (mode === MODES.HARD)
          ? `.moving-row[data-row="${activeRowIndex}"] .symbol`
          : `.symbol`;

      document.querySelectorAll(selector).forEach(img => {
        img.classList.toggle('in-window', isInWindow(img));
      });
    }
    setInterval(updateWindowHighlights, 100);

    function flashLane(rowIndex, kind) {
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (!lane) return;
      lane.classList.remove("good", "bad");
      if (kind === "good") {
        lane.classList.add("good");
        setTimeout(() => lane.classList.remove("good"), 220);
      }
    }

    function pauseRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      if (row) row.style.animationPlayState = "paused";
    }

    function setAllRowsState(state) {
      document.querySelectorAll(".moving-row").forEach(r => r.style.animationPlayState = state);
    }

    function beep(correct) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        if (correct) {
          osc.type = "sine";
          osc.frequency.setValueAtTime(523.25, t); // C5
          osc.frequency.setValueAtTime(659.25, t + 0.05); // E5
          osc.frequency.setValueAtTime(783.99, t + 0.1); // G5

          gain.gain.setValueAtTime(0.0001, t);
          gain.gain.exponentialRampToValueAtTime(0.08, t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.06, t + 0.15);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
        } else {
          return; // silent
        }

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.25);
      } catch (_) {}
    }

    function celebrateSuccess(img) {
      document.body.classList.add('success-flash');
      setTimeout(() => document.body.classList.remove('success-flash'), 300);

      img.style.transform = 'scale(1.2)';
      setTimeout(() => img.style.transform = '', 150);

      if (firstSuccessThisLevel) {
        showToast("✨ PERFECT! ✨", 800);
        firstSuccessThisLevel = false;
      }
    }

    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }

    function startLevelTimer(levelSeconds) {
      stopTimer();
      secondsLeft = levelSeconds;
      updateHUD();

      timerId = setInterval(() => {
        if (levelComplete) return;
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          secondsLeft = 0;
          updateHUD();
          showToast("⏰ Time's up — try again", 1100);
          restartLevel();
          return;
        }
        updateHUD();
      }, 1000);
    }

    function updateHUD() {
      const level = LEVELS[currentLevelIndex];
      const doneCount = targets.filter(t => t.done).length;
      levelDisplay.textContent = `LEVEL ${level.level}`;
      progressCounter.textContent = `${doneCount} / ${targets.length}`;
      timerPill.textContent = `TIME: ${secondsLeft}`;
    }

    function applyResponsiveSizing(levelRows) {
      const root = document.documentElement.style;
      const vh = window.innerHeight || 800;
      const topH = topEl.getBoundingClientRect().height;
      const paddingAndGaps = 10 * 2 + 10;
      const machineAvailable = Math.max(240, vh - topH - paddingAndGaps);

      const maxSymbol = Math.min(120, Math.floor(machineAvailable / (levelRows * 1.45)));
      const minSymbol = Math.max(52, Math.floor(maxSymbol * 0.78));
      const pad = Math.max(4, Math.floor(maxSymbol * 0.10));
      const gap = Math.max(4, Math.floor(maxSymbol * 0.10));

      root.setProperty("--symbolMax", `${maxSymbol}px`);
      root.setProperty("--symbolMin", `${minSymbol}px`);
      root.setProperty("--lanePadY", `${pad}px`);
      root.setProperty("--laneGap", `${gap}px`);
    }

    function buildTargetsForLevel(level) {
      const names = shuffle(SYMBOLS.map(s => s.name).slice());
      const chosen = [];
      for (let r = 0; r < level.rows; r++) {
        const symbolName = names[r % names.length];
        const color = level.useColors ? COLORS[r % COLORS.length] : "bw";
        chosen.push({ rowIndex: r, symbolName, color, done: false });
      }
      return chosen;
    }

    function computeTargetCount(level, speedSeconds, baseLen) {
      const symPerSecond = baseLen / Math.max(1, speedSeconds);
      const maxGapSymbols = Math.max(3, Math.ceil(TARGET_APPEAR_EVERY_SECONDS * symPerSecond));
      const needed = Math.ceil(baseLen / maxGapSymbols) + 1;
      return Math.max(4, needed);
    }

    function pickTargetPositionsEven({ baseLen, targetCount }) {
      const positions = [];
      const step = Math.floor(baseLen / (targetCount + 1));
      for (let i = 1; i <= targetCount; i++) {
        const jitter = Math.floor(Math.random() * (step * 0.3));
        const p = (i * step + jitter) % baseLen;
        positions.push(p);
      }
      const uniq = Array.from(new Set(positions));
      while (uniq.length < targetCount) {
        const p = Math.floor(Math.random() * baseLen);
        if (!uniq.includes(p)) uniq.push(p);
      }
      uniq.sort((a,b) => a-b);
      return uniq;
    }

    function buildRowSequence({ level, speedSeconds, baseLen, targetName, targetColor }) {
      const pattern = new Array(baseLen).fill(null);
      const targetCount = computeTargetCount(level, speedSeconds, baseLen);
      const positions = pickTargetPositionsEven({ baseLen, targetCount });

      for (const p of positions) {
        pattern[p] = { name: targetName, color: level.useColors ? targetColor : "bw", isTarget: true };
      }

      let last = null;
      let streak = 0;

      for (let i = 0; i < baseLen; i++) {
        if (pattern[i]) {
          const nm = pattern[i].name;
          if (nm === last) streak += 1;
          else { last = nm; streak = 1; }
          continue;
        }

        let pick = null;
        for (let tries = 0; tries < 60; tries++) {
          const candidate = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].name;
          if (candidate === targetName) continue;
          if (candidate === last && streak >= 2) continue;
          pick = candidate;
          break;
        }
        if (!pick) pick = SYMBOLS[0].name === targetName ? SYMBOLS[1].name : SYMBOLS[0].name;

        let color = "bw";
        if (level.useColors && level.coloredDistractors) {
          const rate = typeof level.coloredDistractorRate === "number" ? level.coloredDistractorRate : 0.18;
          if (Math.random() < rate) {
            const options = COLORS.filter(c => c !== targetColor);
            color = options[Math.floor(Math.random() * options.length)];
          }
        }

        pattern[i] = { name: pick, color, isTarget: false };

        if (pick === last) streak += 1;
        else { last = pick; streak = 1; }
      }

      return [...pattern, ...pattern, ...pattern];
    }

    function renderTargets() {
      targetContainer.innerHTML = "";

      for (const t of targets) {
        const symbol = getSymbol(t.symbolName);
        if (!symbol) continue;

        const tag = document.createElement("div");
        tag.className = "target-tag";

        const highlight =
          !t.done &&
          !levelComplete &&
          (mode === MODES.NORMAL || t.rowIndex === activeRowIndex);

        if (highlight) tag.classList.add("active");
        if (t.done) tag.classList.add("done");

        const img = document.createElement("img");
        img.alt = symbol.name;
        img.src = `images/${symbol.file}`;
        img.classList.add(colorClass(t.color));
        attachImageFallback(img, symbol.file);

        const dot = document.createElement("div");
        dot.className = "color-dot " + (t.color === "bw" ? "" : dotClass(t.color));
        if (t.color === "bw") dot.style.display = "none";

        const meta = document.createElement("div");
        meta.className = "target-meta";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = symbol.name;

        const meaning = document.createElement("div");
        meaning.className = "meaning";
        meaning.textContent = symbol.meaning;

        const rowPill = document.createElement("span");
        rowPill.className = "pill";
        rowPill.textContent = `Row ${t.rowIndex + 1}`;

        meta.appendChild(name);
        meta.appendChild(meaning);

        tag.appendChild(img);
        tag.appendChild(dot);
        tag.appendChild(meta);
        tag.appendChild(rowPill);

        targetContainer.appendChild(tag);
      }

      updateHUD();
    }

    function onLevelWin() {
      levelComplete = true;
      stopTimer();
      setAllRowsState("paused");
      const levelNum = LEVELS[currentLevelIndex].level;
      showToast(`🎉 LEVEL ${levelNum} CLEARED! 🎉`, 1200);

      setTimeout(() => {
        currentLevelIndex = (currentLevelIndex >= LEVELS.length - 1) ? 0 : (currentLevelIndex + 1);
        machineEl.style.opacity = "0";
        setTimeout(() => {
          buildLevel(currentLevelIndex);
          machineEl.style.opacity = "1";
        }, 180);
      }, 850);
    }

    function handleSymbolClick(img) {
      if (levelComplete) return;

      const rowIndex = Number(img.dataset.row);
      const name = img.dataset.name;
      const color = img.dataset.color;

      // ✅ UX: in Level 1 only, give a hint if tapped outside the window.
      if (!isInWindow(img)) {
        if (LEVELS[currentLevelIndex].level === 1) {
          showToast("Tap when it's inside the GOLD window", 700);
        }
        return; // silent fail otherwise
      }

      if (mode === MODES.HARD && rowIndex !== activeRowIndex) {
        return; // silent fail
      }

      const target = targets.find(t => t.rowIndex === rowIndex);
      if (!target || target.done) return;

      const symbolMatch = name === target.symbolName;
      const colorMatch = (target.color === "bw") ? (color === "bw") : (color === target.color);

      if (!symbolMatch || !colorMatch) {
        return; // silent fail
      }

      beep(true);
      celebrateSuccess(img);
      flashLane(rowIndex, "good");
      target.done = true;
      pauseRow(rowIndex);

      if (mode === MODES.HARD) {
        const next = targets.find(t => !t.done);
        activeRowIndex = next ? next.rowIndex : 0;
      }

      renderTargets();
      if (targets.every(t => t.done)) onLevelWin();
    }

    // Event delegation for clicks
    rowsArea.addEventListener("click", (e) => {
      const img = e.target.closest("img.symbol");
      if (!img) return;
      handleSymbolClick(img);
    }, true);

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      levelComplete = false;
      firstSuccessThisLevel = true;
      rowsArea.innerHTML = "";

      targets = buildTargetsForLevel(level);
      activeRowIndex = 0;

      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.dataset.row = String(r);

        const movingRow = document.createElement("div");
        movingRow.className = `moving-row ${rowDirection(r)}`;
        movingRow.dataset.row = String(r);

        const speedSeconds = Math.max(6, level.baseSpeedSeconds - (r % 2));
        movingRow.style.setProperty("--speed", `${speedSeconds}s`);

        const rowTarget = targets.find(t => t.rowIndex === r);
        const seq = buildRowSequence({
          level,
          speedSeconds,
          baseLen: level.baseLen,
          targetName: rowTarget.symbolName,
          targetColor: rowTarget.color
        });

        for (const it of seq) {
          const s = getSymbol(it.name);
          if (!s) continue;

          const el = document.createElement("img");
          el.src = `images/${s.file}`;
          el.alt = it.name;
          el.className = `symbol ${colorClass(it.color)}${it.isTarget ? " target" : ""}`;

          el.dataset.row = String(r);
          el.dataset.name = it.name;
          el.dataset.color = it.color;

          el.setAttribute(
            "aria-label",
            it.color === "bw" ? `${it.name} black and white` : `${it.name} ${it.color}`
          );

          attachImageFallback(el, s.file);
          movingRow.appendChild(el);
        }

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      renderTargets();

      // ✅ Layout timing: size after DOM is built (reduces “pop”).
      requestAnimationFrame(() => applyResponsiveSizing(level.rows));

      setAllRowsState("running");
      startLevelTimer(level.levelTimeSeconds);

      if (levelIndex === 0 && !localStorage.getItem('adinkraTutorialShown')) {
        tutorialHint.style.display = 'block';
        setTimeout(() => {
          tutorialHint.style.display = 'none';
        }, 5000);
      }
    }

    function restartLevel() {
      stopTimer();
      buildLevel(currentLevelIndex);
    }

    function restartFromLevel1() {
      stopTimer();
      currentLevelIndex = 0;
      buildLevel(currentLevelIndex);
    }

    function setMode(newMode) {
      mode = newMode;
      modeNormalBtn.classList.toggle("active", mode === MODES.NORMAL);
      modeHardBtn.classList.toggle("active", mode === MODES.HARD);

      const next = targets.find(t => !t.done);
      activeRowIndex = next ? next.rowIndex : 0;

      renderTargets();
      showToast(mode === MODES.NORMAL ? "🎯 Normal: Any order" : "⚔️ Hard: Row by row", 700);
    }

    resetButton.addEventListener("click", restartFromLevel1);
    modeNormalBtn.addEventListener("click", () => setMode(MODES.NORMAL));
    modeHardBtn.addEventListener("click", () => setMode(MODES.HARD));
    window.addEventListener("resize", () => applyResponsiveSizing(LEVELS[currentLevelIndex].rows));

    window.onload = () => {
      preloadImages();
      setMode(MODES.NORMAL);
      buildLevel(currentLevelIndex);
      setTimeout(showTutorial, 500);
    };
  </script>
</body>
</html>
