<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
  />
  <title>Adinkra Movers</title>

  <style>
    :root{
      --bg: #f2e4d6;
      --ink: #1f140e;
      --muted: rgba(31, 20, 14, 0.70);

      --panel: #fbf6ef;
      --frame: #2a1a10;
      --line: rgba(31,20,14,0.18);

      --accent: #d2a24c;
      --good: #2a9d58;
      --bad: #d64545;

      --shadow: 0 14px 30px rgba(0,0,0,0.14);

      /* Crisp geometry */
      --r0: 0px;
      --r1: 6px;
      --r2: 10px;

      /* Responsive sizing set by JS */
      --lanePadY: 10px;
      --symbolMin: 86px;
      --symbolMax: 112px;
      --laneGap: 10px;

      /* Slot window width */
      --windowW: clamp(170px, 26vw, 250px);
    }

    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 16px;
    }

    .wrap{
      width: min(860px, 100%);
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    header{
      display:flex;
      flex-direction:column;
      gap: 6px;
      padding: 12px 12px;
      background: var(--panel);
      border: 2px solid var(--frame);
      border-radius: var(--r1);
      box-shadow: var(--shadow);
    }
    header h1{
      font-size: clamp(1.25rem, 2.1vw, 1.7rem);
      letter-spacing: 0.2px;
      font-weight: 900;
      text-transform: uppercase;
    }
    header p{
      font-size: clamp(0.95rem, 1.7vw, 1.05rem);
      color: var(--muted);
      line-height: 1.25;
    }

    .hud{
      display:flex;
      flex-wrap:wrap;
      gap: 8px 10px;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      background: var(--panel);
      border: 2px solid var(--frame);
      border-radius: var(--r1);
      box-shadow: var(--shadow);
    }

    .hud-left, .hud-right{
      display:flex;
      gap: 8px;
      align-items:center;
      flex-wrap: wrap;
    }

    .pill{
      background: #fff;
      border: 1px solid var(--line);
      padding: 8px 10px;
      border-radius: var(--r0);
      font-weight: 900;
      font-size: 0.98rem;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }
    .pill.timer{
      border-color: rgba(31,20,14,0.28);
    }

    button{
      background: #fff;
      border: 1px solid var(--line);
      padding: 9px 12px;
      border-radius: var(--r0);
      font-weight: 900;
      color: var(--ink);
      cursor:pointer;
      letter-spacing: 0.2px;
      text-transform: uppercase;
      font-size: 0.9rem;
    }
    button.primary{
      border-color: rgba(31,20,14,0.34);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    button:active{ transform: translateY(1px); }

    .targets{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap:wrap;
      padding: 10px 12px;
      background: var(--panel);
      border: 2px solid var(--frame);
      border-radius: var(--r1);
      box-shadow: var(--shadow);
    }
    .targets strong{
      font-weight: 900;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    #targetContainer{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
      align-items:center;
    }

    .target-chip{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--r0);
      border: 1px solid var(--line);
      background: #fff;
      position: relative;
      min-width: 260px;
    }
    .target-chip.active{
      outline: 2px solid rgba(210,162,76,0.65);
      outline-offset: 2px;
    }
    .target-chip.done{
      opacity: 0.55;
      filter: grayscale(0.1);
    }
    .target-chip img{
      width: 54px;
      height: 54px;
      object-fit: contain;
    }
    .target-chip .meta{
      display:flex;
      flex-direction:column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    .target-chip .name{
      font-weight: 900;
      font-size: 1.0rem;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .target-chip .meaning{
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge{
      font-weight: 900;
      font-size: 0.82rem;
      border: 1px solid var(--line);
      padding: 6px 8px;
      background: #fff;
      border-radius: var(--r0);
      text-transform: uppercase;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
    .badge.color{
      border-color: rgba(31,20,14,0.28);
    }

    .machine{
      position: relative;
      padding: 12px;
      background: var(--panel);
      border: 2px solid var(--frame);
      border-radius: var(--r1);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .lane{
      position: relative;
      overflow: hidden;
      border-radius: var(--r0);
      border: 2px solid rgba(31,20,14,0.18);
      background: #fff;
      padding: var(--lanePadY) 0;
      margin: var(--laneGap) 0;
    }
    .lane.paused{
      border-color: rgba(31,20,14,0.35);
      background: #fffdf8;
    }
    .lane.correctFlash{
      border-color: rgba(42,157,88,0.9);
      box-shadow: inset 0 0 0 2px rgba(42,157,88,0.22);
    }
    .lane.wrongFlash{
      border-color: rgba(214,69,69,0.9);
      box-shadow: inset 0 0 0 2px rgba(214,69,69,0.22);
    }

    /* Fade edges for a slot feel, but crisp */
    .lane::before,
    .lane::after{
      content:"";
      position:absolute;
      top:0; bottom:0;
      width: 70px;
      z-index: 2;
      pointer-events:none;
    }
    .lane::before{
      left:0;
      background: linear-gradient(to right, rgba(242,228,214,0.98), rgba(242,228,214,0));
    }
    .lane::after{
      right:0;
      background: linear-gradient(to left, rgba(242,228,214,0.98), rgba(242,228,214,0));
    }

    /* Center window — crisp frame */
    .window{
      position:absolute;
      left: 50%;
      top: 12px;
      bottom: 12px;
      width: var(--windowW);
      transform: translateX(-50%);
      border-radius: var(--r0);
      border: 3px solid rgba(31,20,14,0.35);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.65),
        0 10px 18px rgba(0,0,0,0.12);
      pointer-events:none;
      z-index: 4;
    }

    .moving-row{
      display:flex;
      align-items:center;
      gap: 14px;
      width: max-content;
      will-change: transform;
      animation-duration: var(--speed, 12s);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: running;
    }
    .moving-row.ltr{ animation-name: scroll-ltr; }
    @keyframes scroll-ltr{
      from{ transform: translateX(-50%); }
      to{ transform: translateX(0); }
    }
    .moving-row.rtl{ animation-name: scroll-rtl; }
    @keyframes scroll-rtl{
      from{ transform: translateX(0); }
      to{ transform: translateX(-50%); }
    }

    .symbol{
      width: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      height: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      object-fit: contain;
      cursor: pointer;
      user-select:none;
      transform: translateZ(0);
      transition: transform 80ms ease;
      z-index: 1;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12));
    }
    .symbol:active{ transform: scale(0.92); }

    .shake{ animation: shake 260ms ease-in-out; }
    @keyframes shake{
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-8px); }
      50%{ transform: translateX(8px); }
      75%{ transform: translateX(-4px); }
    }

    /* Colorizing filters for grayscale PNGs */
    .c-bw { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12)); }
    .c-red { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(-10deg); }
    .c-yellow { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(20deg); }
    .c-blue { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(190deg); }
    .c-green { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(95deg); }

    /* Overlay for clear state changes */
    .overlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(31,20,14,0.55);
      z-index: 999;
      padding: 16px;
    }
    .overlay.show{ display:flex; }
    .overlay-card{
      width: min(560px, 100%);
      background: #fff;
      border: 3px solid var(--frame);
      border-radius: var(--r0);
      box-shadow: var(--shadow);
      padding: 18px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .overlay-card h2{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-size: 1.1rem;
    }
    .overlay-card p{
      color: var(--muted);
      line-height: 1.25;
    }
    .overlay-actions{
      display:flex;
      gap: 10px;
      justify-content:flex-end;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    @media (prefers-reduced-motion: reduce){
      .moving-row{ animation: none; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Adinkra Movers</h1>
      <p>
        Tap the correct symbol on the correct row — it only counts inside the center window.
        Each correct row pauses. Timer is per level.
      </p>
    </header>

    <div class="hud">
      <div class="hud-left">
        <span class="pill" id="levelDisplay">Level 1</span>
        <span class="pill" id="progressCounter">0 / 1</span>
        <span class="pill timer" id="timerPill">TIME: 0</span>
        <span class="pill" id="modePill">MODE: NORMAL</span>
      </div>
      <div class="hud-right">
        <button class="primary" id="modeButton" type="button">Toggle Mode</button>
        <button id="pauseButton" type="button">Pause</button>
        <button id="resetButton" type="button">Restart</button>
        <button class="primary" id="nextButton" type="button">Next</button>
      </div>
    </div>

    <div class="targets">
      <strong>Find</strong>
      <div id="targetContainer"></div>
    </div>

    <div class="machine">
      <div class="window" id="slotWindow" aria-hidden="true"></div>
      <div id="rowsArea"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <h2 id="overlayTitle">Title</h2>
      <p id="overlayText">Message</p>
      <div class="overlay-actions">
        <button id="overlayRestart" class="primary" type="button">Try Again</button>
        <button id="overlayClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Adinkra Movers
     * - Global per-level timer
     * - Mode toggle: Normal (any order) vs Hard (in order)
     * - Crisp rectangular UI
     * - Unambiguous feedback: lane flash + overlay states
     */

    const SYMBOLS = [
      { name: "Sankofa", file: "Sankofa-egg.png", meaning: "Return and get it" },
      { name: "Dwennimmen", file: "Dwennimmen.png", meaning: "Strength & humility" },
      { name: "Gye Nyame", file: "Gye-Nyame.png", meaning: "Supremacy of God" },
      { name: "Akoma", file: "Akoma-d.png", meaning: "Love & patience" },
      { name: "Duafe", file: "Duafe-beauty.png", meaning: "Beauty & care" },
      { name: "Odo Nyera", file: "love-will.png", meaning: "Eternal love" }
    ];

    const COLORS = ["red", "yellow", "blue", "green"];

    // Max 4 rows; difficulty scales with speed + timer + colors.
    const LEVELS = [
      { level: 1, rows: 1, useColors: false, levelTimeSeconds: 16, baseSpeedSeconds: 12, symbolsPerRow: 14 },
      { level: 2, rows: 2, useColors: false, levelTimeSeconds: 20, baseSpeedSeconds: 12, symbolsPerRow: 14 },
      { level: 3, rows: 3, useColors: false, levelTimeSeconds: 22, baseSpeedSeconds: 11, symbolsPerRow: 15 },
      { level: 4, rows: 3, useColors: true,  levelTimeSeconds: 22, baseSpeedSeconds: 10, symbolsPerRow: 15 },
      { level: 5, rows: 4, useColors: true,  levelTimeSeconds: 20, baseSpeedSeconds: 9,  symbolsPerRow: 16 },
      { level: 6, rows: 4, useColors: true,  levelTimeSeconds: 18, baseSpeedSeconds: 8,  symbolsPerRow: 16 }
    ];

    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const timerPill = document.getElementById("timerPill");
    const modePill = document.getElementById("modePill");

    const resetButton = document.getElementById("resetButton");
    const pauseButton = document.getElementById("pauseButton");
    const nextButton = document.getElementById("nextButton");
    const modeButton = document.getElementById("modeButton");

    const slotWindow = document.getElementById("slotWindow");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const overlayRestart = document.getElementById("overlayRestart");
    const overlayClose = document.getElementById("overlayClose");

    const MODES = { NORMAL: "NORMAL", HARD: "HARD" };

    let currentLevelIndex = 0;

    // One target per row: [{rowIndex, symbolName, color, done}]
    let targets = [];

    // For HARD mode ordering
    let activeRowIndex = 0;

    let paused = false;
    let levelComplete = false;

    // Global timer
    let secondsLeft = 0;
    let timerId = null;

    // Audio reuse
    let audioCtx = null;

    // Mode
    let mode = MODES.NORMAL;

    function applyResponsiveSizing(levelRows) {
      const root = document.documentElement.style;

      if (levelRows <= 2) {
        root.setProperty("--lanePadY", "10px");
        root.setProperty("--symbolMin", "86px");
        root.setProperty("--symbolMax", "112px");
        root.setProperty("--laneGap", "10px");
      } else if (levelRows === 3) {
        root.setProperty("--lanePadY", "9px");
        root.setProperty("--symbolMin", "78px");
        root.setProperty("--symbolMax", "104px");
        root.setProperty("--laneGap", "10px");
      } else {
        // 4 rows (max): tuned for common Android viewports
        root.setProperty("--lanePadY", "8px");
        root.setProperty("--symbolMin", "68px");
        root.setProperty("--symbolMax", "92px");
        root.setProperty("--laneGap", "9px");
      }
    }

    function getSymbol(name) {
      return SYMBOLS.find(s => s.name === name) || null;
    }

    function buildSrc(file) {
      return `images/${file}`;
    }

    function attachImageFallback(img, originalFile) {
      const attempts = new Set();
      const candidates = [
        originalFile,
        originalFile.replace(/-a(?=\.)/i, ""),
        originalFile.replace(/-b(?=\.)/i, ""),
        originalFile.replace(/-d(?=\.)/i, ""),
        originalFile.replace(/_/g, "-"),
        originalFile.replace(/-/g, "_"),
        originalFile.toLowerCase(),
        originalFile.toUpperCase()
      ];

      let idx = 0;

      img.addEventListener("error", () => {
        while (idx < candidates.length && attempts.has(candidates[idx])) idx++;
        if (idx >= candidates.length) return;

        const next = candidates[idx++];
        attempts.add(next);
        img.src = buildSrc(next);
      });
    }

    function colorClass(color) {
      switch (color) {
        case "red": return "c-red";
        case "yellow": return "c-yellow";
        case "blue": return "c-blue";
        case "green": return "c-green";
        default: return "c-bw";
      }
    }

    function rowDirection(rowIndex) {
      return rowIndex % 2 === 0 ? "ltr" : "rtl";
    }

    function randomSymbolName() {
      return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].name;
    }

    function randomColor(useColors) {
      if (!useColors) return "bw";
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function isInsideSlotWindow(imgEl) {
      const w = slotWindow.getBoundingClientRect();
      const r = imgEl.getBoundingClientRect();
      const cx = r.left + (r.width / 2);
      const cy = r.top + (r.height / 2);
      return cx >= w.left && cx <= w.right && cy >= w.top && cy <= w.bottom;
    }

    function vibrate(ms) {
      try {
        if ("vibrate" in navigator) navigator.vibrate(ms);
      } catch (_) {}
    }

    function laneEl(rowIndex) {
      return document.querySelector(`.lane[data-row="${rowIndex}"]`);
    }

    function flashLane(rowIndex, kind) {
      const lane = laneEl(rowIndex);
      if (!lane) return;

      const cls = kind === "good" ? "correctFlash" : "wrongFlash";
      lane.classList.add(cls);
      setTimeout(() => lane.classList.remove(cls), 220);
    }

    function createSymbolImage({ symbolName, color, rowIndex }) {
      const symbol = getSymbol(symbolName);
      if (!symbol) return null;

      const img = document.createElement("img");
      img.className = `symbol ${colorClass(color)}`;
      img.alt = symbolName;
      img.dataset.symbol = symbolName;
      img.dataset.color = color;
      img.dataset.row = String(rowIndex);
      img.src = buildSrc(symbol.file);

      attachImageFallback(img, symbol.file);

      img.addEventListener("click", onSymbolClick);
      return img;
    }

    function onSymbolClick(e) {
      if (paused || levelComplete) return;

      const img = e.currentTarget;

      if (!isInsideSlotWindow(img)) {
        wrongFeedback(img, Number(img.dataset.row));
        return;
      }

      const rowIndex = Number(img.dataset.row);
      const symbolName = img.dataset.symbol;
      const color = img.dataset.color;

      // HARD mode requires solving rows in order
      if (mode === MODES.HARD && rowIndex !== activeRowIndex) {
        wrongFeedback(img, rowIndex);
        return;
      }

      const target = targets.find(t => t.rowIndex === rowIndex);
      if (!target || target.done) {
        wrongFeedback(img, rowIndex);
        return;
      }

      const symbolMatch = target.symbolName === symbolName;
      const colorMatch = target.color === color;

      if (!symbolMatch || !colorMatch) {
        wrongFeedback(img, rowIndex);
        return;
      }

      // Correct
      correctFeedback(rowIndex);
      target.done = true;
      pauseRow(rowIndex);

      if (mode === MODES.HARD) {
        activeRowIndex = nextUndoneRowIndex();
      }

      if (targets.every(t => t.done)) {
        onLevelWin();
        return;
      }

      renderTargets();
      updateHUD();
    }

    function wrongFeedback(img, rowIndex) {
      beep(false);
      vibrate(30);
      flashLane(rowIndex, "bad");
      img.classList.add("shake");
      setTimeout(() => img.classList.remove("shake"), 260);
    }

    function correctFeedback(rowIndex) {
      beep(true);
      vibrate(18);
      flashLane(rowIndex, "good");
    }

    function beep(correct) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const t = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(correct ? 860 : 240, t);

        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.06, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.12);
      } catch (_) {}
    }

    function buildTargetsForLevel(level) {
      const chosen = [];

      const symbolNames = SYMBOLS.map(s => s.name);
      for (let i = symbolNames.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [symbolNames[i], symbolNames[j]] = [symbolNames[j], symbolNames[i]];
      }

      for (let r = 0; r < level.rows; r++) {
        const symbolName = symbolNames[r % symbolNames.length];
        const color = level.useColors ? COLORS[r % COLORS.length] : "bw";
        chosen.push({ rowIndex: r, symbolName, color, done: false });
      }

      return chosen;
    }

    function buildRowContent(level, rowIndex, rowTarget) {
      const base = [];
      const count = level.symbolsPerRow;

      for (let i = 0; i < count; i++) {
        base.push({
          symbolName: randomSymbolName(),
          color: randomColor(level.useColors),
          rowIndex
        });
      }

      // Ensure target appears at least twice
      const insertAt1 = Math.floor(Math.random() * base.length);
      const insertAt2 = Math.floor(Math.random() * base.length);
      base[insertAt1] = { symbolName: rowTarget.symbolName, color: rowTarget.color, rowIndex };
      base[insertAt2] = { symbolName: rowTarget.symbolName, color: rowTarget.color, rowIndex };

      return base.concat(base);
    }

    function renderTargets() {
      targetContainer.innerHTML = "";

      targets.forEach(t => {
        const symbol = getSymbol(t.symbolName);
        if (!symbol) return;

        const chip = document.createElement("div");
        chip.className = "target-chip";

        // Highlight logic:
        // - Normal: highlight all unfinished
        // - Hard: highlight only the current required row
        const shouldHighlight =
          !t.done &&
          !levelComplete &&
          (mode === MODES.NORMAL || t.rowIndex === activeRowIndex);

        if (shouldHighlight) chip.classList.add("active");
        if (t.done) chip.classList.add("done");

        const img = document.createElement("img");
        img.alt = symbol.name;
        img.src = buildSrc(symbol.file);
        img.classList.add(colorClass(t.color));
        attachImageFallback(img, symbol.file);

        const meta = document.createElement("div");
        meta.className = "meta";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = symbol.name;

        const meaning = document.createElement("div");
        meaning.className = "meaning";
        meaning.textContent = symbol.meaning;

        const rowBadge = document.createElement("span");
        rowBadge.className = "badge";
        rowBadge.textContent = `ROW ${t.rowIndex + 1}`;

        const colorBadge = document.createElement("span");
        colorBadge.className = "badge color";
        colorBadge.textContent = (t.color === "bw") ? "B&W" : t.color.toUpperCase();

        meta.appendChild(name);
        meta.appendChild(meaning);

        chip.appendChild(img);
        chip.appendChild(meta);
        chip.appendChild(rowBadge);
        chip.appendChild(colorBadge);
        targetContainer.appendChild(chip);
      });
    }

    function updateHUD() {
      const level = LEVELS[currentLevelIndex];
      const total = targets.length;
      const doneCount = targets.filter(t => t.done).length;

      levelDisplay.textContent = `LEVEL ${level.level}`;
      progressCounter.textContent = `${doneCount} / ${total}`;
      timerPill.textContent = `TIME: ${secondsLeft}`;
      modePill.textContent = `MODE: ${mode}`;
    }

    function pauseRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      const lane = laneEl(rowIndex);
      if (row) row.style.animationPlayState = "paused";
      if (lane) lane.classList.add("paused");
    }

    function resumeRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      const lane = laneEl(rowIndex);
      if (row) row.style.animationPlayState = "running";
      if (lane) lane.classList.remove("paused");
    }

    function setAllRowsState(state) {
      document.querySelectorAll(".moving-row").forEach(r => r.style.animationPlayState = state);
      document.querySelectorAll(".lane").forEach(l => {
        if (state === "paused") l.classList.add("paused");
        else l.classList.remove("paused");
      });
    }

    function nextUndoneRowIndex() {
      const next = targets.find(t => !t.done);
      return next ? next.rowIndex : 0;
    }

    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }

    function startLevelTimer(levelSeconds) {
      stopTimer();
      secondsLeft = levelSeconds;
      updateHUD();

      timerId = setInterval(() => {
        if (paused || levelComplete) return;
        secondsLeft -= 1;

        if (secondsLeft <= 0) {
          secondsLeft = 0;
          updateHUD();
          onTimeUp();
          return;
        }
        updateHUD();
      }, 1000);
    }

    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.add("show");
    }

    function hideOverlay() {
      overlay.classList.remove("show");
    }

    function onTimeUp() {
      stopTimer();
      setAllRowsState("paused");
      showOverlay(
        "TIME'S UP",
        "No worries — try again. Tip: taps only count inside the center window."
      );
    }

    function onLevelWin() {
      levelComplete = true;
      stopTimer();
      setAllRowsState("paused");
      renderTargets();
      updateHUD();

      showOverlay(
        "MATCH COMPLETE",
        `Level ${LEVELS[currentLevelIndex].level} cleared. Ready for the next level?`
      );
    }

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      applyResponsiveSizing(level.rows);

      rowsArea.innerHTML = "";
      paused = false;
      levelComplete = false;
      pauseButton.textContent = "PAUSE";

      targets = buildTargetsForLevel(level);

      // Reset hard-mode ordering
      activeRowIndex = 0;

      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.dataset.row = String(r);

        const movingRow = document.createElement("div");
        movingRow.className = `moving-row ${rowDirection(r)}`;
        movingRow.dataset.row = String(r);

        // Slightly vary speed per row for feel
        const speed = Math.max(6, level.baseSpeedSeconds - (r % 2));
        movingRow.style.setProperty("--speed", `${speed}s`);

        const rowTarget = targets.find(t => t.rowIndex === r);
        const items = buildRowContent(level, r, rowTarget);

        items.forEach(item => {
          const img = createSymbolImage(item);
          if (img) movingRow.appendChild(img);
        });

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      renderTargets();
      updateHUD();
      startLevelTimer(level.levelTimeSeconds);
      setAllRowsState("running");
      hideOverlay();
    }

    function togglePause() {
      if (levelComplete) return;

      paused = !paused;
      if (paused) {
        setAllRowsState("paused");
        pauseButton.textContent = "RESUME";
      } else {
        // Resume only unsolved rows
        targets.forEach(t => {
          if (t.done) pauseRow(t.rowIndex);
          else resumeRow(t.rowIndex);
        });
        pauseButton.textContent = "PAUSE";
      }
    }

    function restartFromLevel1() {
      stopTimer();
      currentLevelIndex = 0;
      buildLevel(currentLevelIndex);
    }

    function restartLevel() {
      stopTimer();
      buildLevel(currentLevelIndex);
    }

    function nextLevel() {
      stopTimer();
      currentLevelIndex = Math.min(currentLevelIndex + 1, LEVELS.length - 1);
      buildLevel(currentLevelIndex);
    }

    function toggleMode() {
      mode = (mode === MODES.NORMAL) ? MODES.HARD : MODES.NORMAL;

      // When switching into HARD, reset the ordering marker
      activeRowIndex = nextUndoneRowIndex();

      renderTargets();
      updateHUD();

      showOverlay(
        "MODE CHANGED",
        mode === MODES.NORMAL
          ? "Normal mode: solve rows in any order."
          : "Hard mode: solve Row 1, then Row 2, then Row 3, then Row 4."
      );
    }

    resetButton.addEventListener("click", restartFromLevel1);
    pauseButton.addEventListener("click", togglePause);
    nextButton.addEventListener("click", nextLevel);
    modeButton.addEventListener("click", toggleMode);

    overlayRestart.addEventListener("click", () => {
      hideOverlay();
      restartLevel();
    });
    overlayClose.addEventListener("click", hideOverlay);

    window.onload = () => buildLevel(currentLevelIndex);
  </script>
</body>
</html>
