<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
  />
  <title>Adinkra Movers</title>

  <style>
    :root{
      --bg: #f5e7d9;
      --ink: #24160c;
      --muted: rgba(36, 22, 12, 0.70);
      --line: rgba(36, 22, 12, 0.16);
      --panel: rgba(255, 255, 255, 0.55);
      --panel-2: rgba(255, 255, 255, 0.35);
      --shadow: 0 14px 30px rgba(0,0,0,0.10);
      --radius: 22px;

      /* Responsive sizing driven by rows (set in JS) */
      --lanePadY: 10px;
      --symbolMin: 86px;
      --symbolMax: 112px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 18px;
    }

    .wrap{
      width: min(820px, 100%);
      display:flex;
      flex-direction:column;
      gap: 14px;
    }

    header{ display:flex; flex-direction:column; gap: 6px; }
    header h1{
      font-size: clamp(1.35rem, 2.2vw, 1.8rem);
      letter-spacing: 0.2px;
      font-weight: 900;
    }
    header p{
      font-size: clamp(0.98rem, 1.8vw, 1.08rem);
      color: var(--muted);
      line-height: 1.25;
    }

    .hud{
      display:flex;
      flex-wrap:wrap;
      gap: 10px 12px;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hud-left, .hud-right{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
    }

    .pill{
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 8px 10px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 0.98rem;
      white-space: nowrap;
    }

    button{
      background: transparent;
      border: 1px solid var(--line);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 900;
      color: var(--ink);
      cursor:pointer;
    }
    button:active{ transform: translateY(1px); }

    .targets{
      display:flex;
      align-items:center;
      gap: 12px;
      flex-wrap:wrap;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .targets strong{ font-weight: 900; letter-spacing: 0.2px; }

    #targetContainer{
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      align-items:center;
    }

    .target-chip{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.65);
      position: relative;
    }

    .target-chip.active{
      outline: 2px solid rgba(36,22,12,0.24);
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .target-chip.done{ opacity: 0.55; text-decoration: line-through; }

    .target-chip img{
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12));
    }

    .target-chip .meta{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 140px;
    }
    .target-chip .name{ font-weight: 900; font-size: 1.02rem; line-height: 1.05; }
    .target-chip .meaning{ font-size: 0.84rem; color: var(--muted); line-height: 1.1; }
    .row-badge{
      font-weight: 900;
      font-size: 0.82rem;
      color: rgba(36,22,12,0.75);
      background: rgba(36,22,12,0.06);
      border: 1px solid rgba(36,22,12,0.12);
      padding: 4px 8px;
      border-radius: 999px;
      margin-left: 4px;
      white-space: nowrap;
    }

    .machine{
      position: relative;
      padding: 14px;
      background: rgba(255,255,255,0.35);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 8px);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .lane{
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
      padding: var(--lanePadY) 0;
      margin: 12px 0;
    }

    .lane.paused{ background: rgba(255,255,255,0.80); }

    .lane::before,
    .lane::after{
      content:"";
      position:absolute;
      top:0; bottom:0;
      width: 74px;
      z-index: 2;
      pointer-events:none;
    }
    .lane::before{
      left:0;
      background: linear-gradient(to right, rgba(245,231,217,0.95), rgba(245,231,217,0));
    }
    .lane::after{
      right:0;
      background: linear-gradient(to left, rgba(245,231,217,0.95), rgba(245,231,217,0));
    }

    /* The “slot window” */
    .window{
      position:absolute;
      left: 50%;
      top: 14px;
      bottom: 14px;
      width: clamp(170px, 26vw, 250px);
      transform: translateX(-50%);
      border-radius: 18px;
      border: 2px solid rgba(36,22,12,0.22);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
      pointer-events:none;
      z-index: 3;
    }

    .moving-row{
      display:flex;
      align-items:center;
      gap: 14px;
      width: max-content;
      will-change: transform;
      animation-duration: var(--speed, 12s);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: running;
    }

    .moving-row.ltr{ animation-name: scroll-ltr; }
    @keyframes scroll-ltr{
      from{ transform: translateX(-50%); }
      to{ transform: translateX(0); }
    }

    .moving-row.rtl{ animation-name: scroll-rtl; }
    @keyframes scroll-rtl{
      from{ transform: translateX(0); }
      to{ transform: translateX(-50%); }
    }

    .symbol{
      width: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      height: clamp(var(--symbolMin), 10vw, var(--symbolMax));
      object-fit: contain;
      cursor: pointer;
      user-select:none;
      transform: translateZ(0);
      transition: transform 80ms ease;
      z-index: 1;
      /* keep effects lighter for low-end devices */
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12));
    }
    .symbol:active{ transform: scale(0.92); }

    .shake{ animation: shake 260ms ease-in-out; }
    @keyframes shake{
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-8px); }
      50%{ transform: translateX(8px); }
      75%{ transform: translateX(-4px); }
    }

    /* “Colorizing” filters for grayscale PNGs */
    .c-bw { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12)); }
    .c-red { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(-10deg); }
    .c-yellow { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(20deg); }
    .c-blue { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(190deg); }
    .c-green { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.12)) sepia(1) saturate(7) hue-rotate(95deg); }

    .footer-note{
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.25;
      padding: 0 2px;
    }

    @media (prefers-reduced-motion: reduce){
      .moving-row{ animation: none; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Adinkra Movers</h1>
      <p>
        Tap the correct symbol on the correct row — but it only counts if it’s inside the center window.
        Get a row right and it pauses. Run out of time and the level restarts.
      </p>
    </header>

    <div class="hud">
      <div class="hud-left">
        <span class="pill" id="levelDisplay">Level 1</span>
        <span class="pill" id="progressCounter">0 / 1</span>
        <span class="pill" id="timerPill">⏱ 0</span>
      </div>
      <div class="hud-right">
        <button id="pauseButton" type="button">⏸ Pause</button>
        <button id="resetButton" type="button">↺ Restart</button>
        <button id="nextButton" type="button">Next ▶</button>
      </div>
    </div>

    <div class="targets">
      <strong>Find:</strong>
      <div id="targetContainer"></div>
    </div>

    <div class="machine">
      <div class="window" id="slotWindow" aria-hidden="true"></div>
      <div id="rowsArea"></div>
    </div>

    <div class="footer-note">
      Mobile-first: max 4 rows. Levels 1–3 are black &amp; white. Level 4+ introduces colors.
    </div>
  </div>

  <script>
    /**
     * Adinkra Movers — capped at 4 rows + center-window rule
     */

    const SYMBOLS = [
      { name: "Sankofa", file: "Sankofa-egg.png", meaning: "Return and get it" },
      { name: "Dwennimmen", file: "Dwennimmen.png", meaning: "Strength & humility" },
      { name: "Gye Nyame", file: "Gye-Nyame.png", meaning: "Supremacy of God" },
      { name: "Akoma", file: "Akoma-d.png", meaning: "Love & patience" },
      { name: "Duafe", file: "Duafe-beauty.png", meaning: "Beauty & care" },
      { name: "Odo Nyera", file: "love-will.png", meaning: "Eternal love" }
    ];

    const COLORS = ["red", "yellow", "blue", "green"];

    // ✅ Capped at 4 rows, difficulty increases via speed + timer + colors
    const LEVELS = [
      { level: 1, rows: 1, useColors: false, stepTimeSeconds: 10, baseSpeedSeconds: 12, symbolsPerRow: 14 },
      { level: 2, rows: 2, useColors: false, stepTimeSeconds: 10, baseSpeedSeconds: 12, symbolsPerRow: 14 },
      { level: 3, rows: 3, useColors: false, stepTimeSeconds: 9,  baseSpeedSeconds: 11, symbolsPerRow: 15 },
      { level: 4, rows: 3, useColors: true,  stepTimeSeconds: 9,  baseSpeedSeconds: 10, symbolsPerRow: 15 },
      { level: 5, rows: 4, useColors: true,  stepTimeSeconds: 8,  baseSpeedSeconds: 9,  symbolsPerRow: 16 },
      { level: 6, rows: 4, useColors: true,  stepTimeSeconds: 7,  baseSpeedSeconds: 8,  symbolsPerRow: 16 }
    ];

    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const timerPill = document.getElementById("timerPill");
    const resetButton = document.getElementById("resetButton");
    const pauseButton = document.getElementById("pauseButton");
    const nextButton = document.getElementById("nextButton");
    const slotWindow = document.getElementById("slotWindow");

    let currentLevelIndex = 0;

    // One target per row: [{rowIndex, symbolName, color, done}]
    let targets = [];
    let activeRowIndex = 0;
    let paused = false;
    let levelComplete = false;

    let secondsLeft = 0;
    let timerId = null;

    let audioCtx = null;

    function applyResponsiveSizing(levelRows) {
      const root = document.documentElement.style;

      if (levelRows <= 2) {
        root.setProperty("--lanePadY", "10px");
        root.setProperty("--symbolMin", "86px");
        root.setProperty("--symbolMax", "112px");
      } else if (levelRows === 3) {
        root.setProperty("--lanePadY", "9px");
        root.setProperty("--symbolMin", "78px");
        root.setProperty("--symbolMax", "104px");
      } else {
        // 4 rows (max): still comfortable on common Android screens
        root.setProperty("--lanePadY", "8px");
        root.setProperty("--symbolMin", "68px");
        root.setProperty("--symbolMax", "92px");
      }
    }

    function getSymbol(name) {
      return SYMBOLS.find(s => s.name === name) || null;
    }

    function buildSrc(file) {
      return `images/${file}`;
    }

    function attachImageFallback(img, originalFile) {
      const attempts = new Set();
      const candidates = [
        originalFile,
        originalFile.replace(/-a(?=\.)/i, ""),
        originalFile.replace(/-b(?=\.)/i, ""),
        originalFile.replace(/-d(?=\.)/i, ""),
        originalFile.replace(/_/g, "-"),
        originalFile.replace(/-/g, "_"),
        originalFile.toLowerCase(),
        originalFile.toUpperCase()
      ];

      let idx = 0;

      img.addEventListener("error", () => {
        while (idx < candidates.length && attempts.has(candidates[idx])) idx++;
        if (idx >= candidates.length) return;

        const next = candidates[idx++];
        attempts.add(next);
        img.src = buildSrc(next);
      });
    }

    function colorClass(color) {
      switch (color) {
        case "red": return "c-red";
        case "yellow": return "c-yellow";
        case "blue": return "c-blue";
        case "green": return "c-green";
        default: return "c-bw";
      }
    }

    function rowDirection(rowIndex) {
      return rowIndex % 2 === 0 ? "ltr" : "rtl";
    }

    function randomSymbolName() {
      return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].name;
    }

    function randomColor(useColors) {
      if (!useColors) return "bw";
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function isInsideSlotWindow(imgEl) {
      const w = slotWindow.getBoundingClientRect();
      const r = imgEl.getBoundingClientRect();

      // Use the image center point
      const cx = r.left + (r.width / 2);
      const cy = r.top + (r.height / 2);

      return cx >= w.left && cx <= w.right && cy >= w.top && cy <= w.bottom;
    }

    function createSymbolImage({ symbolName, color, rowIndex }) {
      const symbol = getSymbol(symbolName);
      if (!symbol) return null;

      const img = document.createElement("img");
      img.className = `symbol ${colorClass(color)}`;
      img.alt = symbolName;
      img.dataset.symbol = symbolName;
      img.dataset.color = color;
      img.dataset.row = String(rowIndex);
      img.src = buildSrc(symbol.file);

      attachImageFallback(img, symbol.file);

      img.addEventListener("click", onSymbolClick);
      return img;
    }

    function onSymbolClick(e) {
      if (paused || levelComplete) return;

      const img = e.currentTarget;

      // ✅ Slot-machine rule: must be inside the center window
      if (!isInsideSlotWindow(img)) {
        wrongFeedback(img);
        return;
      }

      const rowIndex = Number(img.dataset.row);
      const symbolName = img.dataset.symbol;
      const color = img.dataset.color;

      // Must be correct row in sequence
      if (rowIndex !== activeRowIndex) {
        wrongFeedback(img);
        return;
      }

      const target = targets.find(t => t.rowIndex === rowIndex);
      if (!target || target.done) {
        wrongFeedback(img);
        return;
      }

      const symbolMatch = target.symbolName === symbolName;
      const colorMatch = target.color === color;

      if (symbolMatch && colorMatch) {
        correctFeedback();

        target.done = true;
        pauseRow(rowIndex);

        if (targets.every(t => t.done)) {
          levelComplete = true;
          stopTimer();
          setAllRowsState("paused");
          renderTargets();
          updateHUD();
          setTimeout(() => alert(`🎉 Level ${LEVELS[currentLevelIndex].level} complete!`), 100);
          return;
        }

        activeRowIndex = nextUndoneRowIndex();
        renderTargets();
        updateHUD();
        restartStepTimer();
      } else {
        wrongFeedback(img);
      }
    }

    function wrongFeedback(img) {
      beep(false);
      img.classList.add("shake");
      setTimeout(() => img.classList.remove("shake"), 260);
    }

    function correctFeedback() {
      beep(true);
    }

    function beep(correct) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const t = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(correct ? 820 : 260, t);

        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.07, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.13);
      } catch (_) {}
    }

    function buildTargetsForLevel(level) {
      const chosen = [];

      const symbolNames = SYMBOLS.map(s => s.name);
      for (let i = symbolNames.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [symbolNames[i], symbolNames[j]] = [symbolNames[j], symbolNames[i]];
      }

      for (let r = 0; r < level.rows; r++) {
        const symbolName = symbolNames[r % symbolNames.length];
        const color = level.useColors ? COLORS[r % COLORS.length] : "bw";
        chosen.push({ rowIndex: r, symbolName, color, done: false });
      }

      return chosen;
    }

    function buildRowContent(level, rowIndex, rowTarget) {
      const base = [];
      const count = level.symbolsPerRow;

      for (let i = 0; i < count; i++) {
        base.push({
          symbolName: randomSymbolName(),
          color: randomColor(level.useColors),
          rowIndex
        });
      }

      // Ensure target appears at least twice
      const insertAt1 = Math.floor(Math.random() * base.length);
      const insertAt2 = Math.floor(Math.random() * base.length);
      base[insertAt1] = { symbolName: rowTarget.symbolName, color: rowTarget.color, rowIndex };
      base[insertAt2] = { symbolName: rowTarget.symbolName, color: rowTarget.color, rowIndex };

      return base.concat(base); // seamless scroll
    }

    function renderTargets() {
      targetContainer.innerHTML = "";

      targets.forEach(t => {
        const symbol = getSymbol(t.symbolName);
        if (!symbol) return;

        const chip = document.createElement("div");
        chip.className = "target-chip";
        if (t.rowIndex === activeRowIndex && !t.done && !levelComplete) chip.classList.add("active");
        if (t.done) chip.classList.add("done");

        const img = document.createElement("img");
        img.alt = symbol.name;
        img.src = buildSrc(symbol.file);
        img.classList.add(colorClass(t.color));
        attachImageFallback(img, symbol.file);

        const meta = document.createElement("div");
        meta.className = "meta";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = symbol.name;

        const meaning = document.createElement("div");
        meaning.className = "meaning";
        meaning.textContent = symbol.meaning;

        const badge = document.createElement("span");
        badge.className = "row-badge";
        badge.textContent = `Row ${t.rowIndex + 1}${t.color !== "bw" ? ` • ${t.color.toUpperCase()}` : ""}`;

        meta.appendChild(name);
        meta.appendChild(meaning);

        chip.appendChild(img);
        chip.appendChild(meta);
        chip.appendChild(badge);
        targetContainer.appendChild(chip);
      });
    }

    function updateHUD() {
      const total = targets.length;
      const doneCount = targets.filter(t => t.done).length;

      levelDisplay.textContent = `Level ${LEVELS[currentLevelIndex].level}`;
      progressCounter.textContent = `${doneCount} / ${total}`;
      timerPill.textContent = `⏱ ${secondsLeft}`;
    }

    function pauseRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (row) row.style.animationPlayState = "paused";
      if (lane) lane.classList.add("paused");
    }

    function resumeRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (row) row.style.animationPlayState = "running";
      if (lane) lane.classList.remove("paused");
    }

    function setAllRowsState(state) {
      document.querySelectorAll(".moving-row").forEach(r => r.style.animationPlayState = state);
      document.querySelectorAll(".lane").forEach(l => {
        if (state === "paused") l.classList.add("paused");
        else l.classList.remove("paused");
      });
    }

    function nextUndoneRowIndex() {
      const next = targets.find(t => !t.done);
      return next ? next.rowIndex : 0;
    }

    function stopTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
    }

    function restartStepTimer() {
      stopTimer();
      const level = LEVELS[currentLevelIndex];
      secondsLeft = level.stepTimeSeconds;
      updateHUD();

      timerId = setInterval(() => {
        if (paused || levelComplete) return;
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          secondsLeft = 0;
          updateHUD();
          onTimeoutReset();
          return;
        }
        updateHUD();
      }, 1000);
    }

    function onTimeoutReset() {
      stopTimer();
      setAllRowsState("running");

      // Full restart of attempt (as you originally described)
      targets.forEach(t => (t.done = false));
      activeRowIndex = 0;
      levelComplete = false;

      renderTargets();
      updateHUD();
      restartStepTimer();
    }

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      applyResponsiveSizing(level.rows);

      rowsArea.innerHTML = "";
      paused = false;
      levelComplete = false;
      pauseButton.textContent = "⏸ Pause";

      targets = buildTargetsForLevel(level);
      activeRowIndex = 0;

      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.dataset.row = String(r);

        const movingRow = document.createElement("div");
        movingRow.className = `moving-row ${rowDirection(r)}`;
        movingRow.dataset.row = String(r);

        // Speed ramps slightly by row
        const speed = Math.max(6, level.baseSpeedSeconds - (r % 2));
        movingRow.style.setProperty("--speed", `${speed}s`);

        const rowTarget = targets.find(t => t.rowIndex === r);
        const items = buildRowContent(level, r, rowTarget);

        items.forEach(item => {
          const img = createSymbolImage(item);
          if (img) movingRow.appendChild(img);
        });

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      renderTargets();
      secondsLeft = level.stepTimeSeconds;
      updateHUD();
      restartStepTimer();
      setAllRowsState("running");
    }

    function togglePause() {
      if (levelComplete) return;
      paused = !paused;

      if (paused) {
        setAllRowsState("paused");
        pauseButton.textContent = "▶ Resume";
      } else {
        // Resume only rows not done
        targets.forEach(t => {
          if (t.done) pauseRow(t.rowIndex);
          else resumeRow(t.rowIndex);
        });
        pauseButton.textContent = "⏸ Pause";
      }
    }

    function restartFromLevel1() {
      stopTimer();
      currentLevelIndex = 0;
      buildLevel(currentLevelIndex);
    }

    function nextLevel() {
      stopTimer();
      currentLevelIndex = Math.min(currentLevelIndex + 1, LEVELS.length - 1);
      buildLevel(currentLevelIndex);
    }

    resetButton.addEventListener("click", restartFromLevel1);
    pauseButton.addEventListener("click", togglePause);
    nextButton.addEventListener("click", nextLevel);

    window.onload = () => buildLevel(currentLevelIndex);
  </script>
</body>
</html>
